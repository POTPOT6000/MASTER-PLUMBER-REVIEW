<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: #1e293b; --btn-ghost: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden; height: fit-content;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        @keyframes successPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate-wrong { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-right { animation: successPop 0.4s ease-out both; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 16px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--accent); color: #fff !important; }
        .btn-gcash { background: #007dfe; color: white !important; }
        .locked { opacity: 0.5; cursor: not-allowed; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--danger) !important; color: white !important; }
        .status-text { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .qr-box { width: 150px; height: 150px; background: white; margin: 10px auto; border: 2px solid #007dfe; border-radius: 10px; padding: 5px; }
        .qr-box img { width: 100%; height: 100%; }
        #scoreBox { position: absolute; top: 20px; right: 20px; background: var(--accent); color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; display: none; }
    </style>
</head>
<body data-theme="light">

<div class="app-card" id="appBody">
    <div id="scoreBox">0/0</div>

    <div id="authScreen" class="screen" style="display: block;">
        <div style="text-align: center; margin-bottom: 20px;">
            <ion-icon name="school-outline" style="font-size: 60px; color: var(--accent);"></ion-icon>
            <h2 style="margin:0">Master Plumber</h2>
        </div>
        <button class="btn-main" onclick="enterAsGuest()">Try as Guest (Exam 1 Only)</button>
        <div style="margin: 15px 0; text-align: center; font-size: 11px; color: var(--sub);">-- OR LOGIN FOR FULL ACCESS --</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Login / Register</button>
    </div>

    <div id="paymentScreen" class="screen">
        <div style="text-align: center;">
            <h3 style="margin-bottom:5px;">Upgrade to Pro</h3>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GCASH_09123456789" alt="QR">
            </div>
            <p style="font-size: 13px; font-weight: 700; color: #007dfe; margin:0;">GCash: 09XX XXX XXXX</p>
            <input type="text" id="licenseKey" placeholder="Enter License Key">
            <button class="btn-main" onclick="verifyKey()">Activate Now</button>
            <button onclick="setScreen('home')" style="background:transparent; font-size:12px;">Maybe Later</button>
        </div>
    </div>

    <div id="home" class="screen">
        <h1 style="font-size: 18px; text-align: center;">MASTER PLUMBER REVIEWER</h1>
        <p id="userStatus" style="text-align: center; font-size: 11px; font-weight: 600;"></p>
        <button class="btn-main" onclick="openExams('Plumbing Code')">Plumbing Code</button>
        <button class="btn-main" onclick="openExams('Plumbing Arithmetic')">Plumbing Arithmetic</button>
        <button class="btn-main" onclick="openExams('Sanitation Plumbing Design and Installation')">Sanitation & Design</button>
        <button class="btn-main" onclick="openExams('Practical Problems and Experiences')">Practical Problems</button>
        
        <div id="upgradeSection">
             <button onclick="setScreen('paymentScreen')" style="background: var(--warning); color:white;">Unlock All Exams</button>
        </div>
        <button onclick="logout()" style="margin-top: 10px; border: 1px solid var(--border); color: var(--danger); font-size: 12px;">Exit App</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent);"></h2>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 10px; font-weight: 800; color: var(--accent);"></div>
        <div id="qTxt" style="font-size: 16px; font-weight: 600; margin: 15px 0;"></div>
        <span id="qStatus" class="status-text"></span>
        <div id="choices"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="prevQ()">Back</button>
            <button onclick="handleNextLogic()" class="btn-main">Next</button>
        </div>
        <button onclick="quitQuiz()" style="font-size:11px; margin-top:10px;">Quit Exam</button>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center; color: var(--accent);"></h2>
        <div id="revScroll" style="max-height: 350px; overflow-y: auto; background: var(--btn-ghost); border-radius: 16px; padding: 10px;"></div>
        <button class="btn-main" onclick="setScreen('home')">Finish</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB, "Plumbing Code": codeDB,
        "Sanitation Plumbing Design and Installation": designDB, "Practical Problems and Experiences": practicalDB
    };

    let currentUser = null, isPaid = false, currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0;
    const VALID_KEYS = ["MP-MASTER-2024"]; 

    // AUTH / GUEST LOGIC
    window.enterAsGuest = () => {
        currentUser = "Guest"; isPaid = false;
        updateUI(); setScreen('home');
    };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Enter credentials");
        
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u);
        
        if(!user) { // Auto-register
            user = { u, p, paid: false };
            users.push(user);
            localStorage.setItem('mp_users', JSON.stringify(users));
        } else if(user.p !== p) {
            return alert("Wrong password");
        }
        
        currentUser = user.u; isPaid = user.paid;
        updateUI(); setScreen('home');
    };

    function updateUI() {
        document.getElementById('userStatus').innerText = isPaid ? `PRO ACCOUNT: ${currentUser}` : `GUEST MODE (Limited)`;
        document.getElementById('userStatus').style.color = isPaid ? "var(--success)" : "var(--warning)";
        document.getElementById('upgradeSection').style.display = isPaid ? "none" : "block";
    }

    window.verifyKey = () => {
        const key = document.getElementById('licenseKey').value.trim();
        if(VALID_KEYS.includes(key)) {
            isPaid = true;
            if(currentUser !== "Guest") {
                let users = JSON.parse(localStorage.getItem('mp_users'));
                users.find(x => x.u === currentUser).paid = true;
                localStorage.setItem('mp_users', JSON.stringify(users));
            }
            updateUI(); alert("Pro Unlocked!"); setScreen('home');
        } else alert("Invalid Key");
    };

    window.logout = () => { location.reload(); };

    // CORE APP
    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++){
            const isLocked = (!isPaid && i > 1);
            const btn = document.createElement('button');
            btn.className = isLocked ? "locked" : "";
            btn.innerHTML = `EXAM #${i} ${isLocked ? '<ion-icon name="lock-closed"></ion-icon>' : ''}`;
            btn.onclick = () => {
                if(isLocked) alert("Upgrade to PRO to unlock Exams 2-15");
                else startQuiz(i);
            };
            grid.appendChild(btn);
        }
        setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx; currentQs = [...DB[currentCat][idx]];
        curIdx = 0; answers = new Array(currentQs.length).fill(null); score = 0;
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const qData = currentQs[curIdx];
        document.getElementById('qNum').innerText = `Q${curIdx+1} / ${currentQs.length}`;
        document.getElementById('qTxt').innerText = qData.q;
        const box = document.getElementById('choices'); box.innerHTML = "";
        qData.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === qData.a) b.classList.add('correct');
                else if(i === answers[curIdx]) b.classList.add('wrong');
                b.disabled = true;
            } else {
                b.onclick = () => {
                    answers[curIdx] = i;
                    if(i === qData.a) document.getElementById('appBody').classList.add('animate-right');
                    else document.getElementById('appBody').classList.add('animate-wrong');
                    setTimeout(() => document.getElementById('appBody').classList.remove('animate-right', 'animate-wrong'), 400);
                    score = answers.filter((a, i) => a === currentQs[i].a).length;
                    document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
                    loadQ();
                };
            }
            box.appendChild(b);
        });
    };

    window.handleNextLogic = () => { if(curIdx < currentQs.length - 1) { curIdx++; loadQ(); } else showResults(); };
    window.quitQuiz = () => { if(confirm("Quit?")) setScreen('home'); };

    function showResults() {
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        document.getElementById('resScore').innerText = `Score: ${score} / ${currentQs.length}`;
        currentQs.forEach((q, i) => {
            let ch = ""; q.choices.forEach((c, ci) => {
                let cls = (ci === q.a) ? "correct" : (ci === answers[i] ? "wrong" : "");
                ch += `<div style="font-size:12px; padding:5px; margin:2px; border-radius:5px;" class="${cls}">${c}</div>`;
            });
            scroll.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${i+1}. ${q.q}</b>${ch}</div>`;
        });
        setScreen('results');
    }

    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };
</script>
</body>
</html>
