<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
            --orange: #f97316; --light-blue: #bae6fd; --dark-blue: #1d4ed8;
            --pro-gradient: linear-gradient(135deg, #FF6B00 0%, #FF2E00 100%);
            --pro-text: #FFEBCC;
            --status-free: #64748b;
            --cat-icon-code: #E0F2FE; --cat-icon-arith: #FEE2E2; --cat-icon-design: #DCFCE7; --cat-icon-prac: #FFEDD5;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --warning: #fbbf24; --bg: #020617; --card: #0f172a; --text: #f1f5f9;
            --sub: #94a3b8; --border: #1e293b; --btn-ghost: #1e293b;
            --pro-gradient: linear-gradient(135deg, #cc5500 0%, #cc2400 100%);
            --pro-text: #fef0db;
            --status-free: #94a3b8;
            --cat-icon-code: #0c4a6e; --cat-icon-arith: #7f1d1d; --cat-icon-design: #14532d; --cat-icon-prac: #7c2d12;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.2s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; padding-bottom: 90px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 25px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden;
        }

        /* Animations */
        .screen { 
            display: none; 
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        button:active { transform: scale(0.95); }
        .category-item:active { transform: scale(0.98); }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; 
            background: var(--card); border-top: 1px solid var(--border); 
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; padding: 0 10px; border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05); z-index: 1000;
        }
        [data-theme="dark"] .bottom-nav { background: #0f172a; border-color: #1e293b; }

        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 4px; color: var(--sub); background: transparent; 
            border: none; font-size: 11px; font-weight: 700; width: 80px;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent); transform: translateY(-3px); }
        .nav-icon { font-size: 22px; }

        button { 
            width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 16px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); 
            color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-main { background: var(--accent); color: #fff !important; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--btn-ghost); display:none; }
        #progressBar { height: 100%; background: var(--accent); width: 0%; transition: 0.4s ease; }
        
        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--danger) !important; color: white !important; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        
        .exam-item { display: flex; align-items: center; gap: 10px; background: var(--btn-ghost); margin: 8px 0; padding: 5px 15px; border-radius: 15px; }
        .locked { opacity: 0.5; }
        
        .new-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .greeting-container { display: flex; flex-direction: column; gap: 2px; }
        .user-greeting { font-size: 20px; font-weight: 700; color: var(--text); }
        .membership-status { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--sub); letter-spacing: 0.5px; }

        .pro-card { background: var(--pro-gradient); border-radius: 20px; padding: 20px; color: white; display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(255, 60, 0, 0.2); }
        .pro-card h3 { margin: 0; font-size: 17px; font-weight: 800; color: white; }
        .upgrade-btn { background: #fff; color: #f97316; font-size: 12px; font-weight: 700; padding: 12px; margin: 5px 0 0 0; text-transform: uppercase; letter-spacing: 1px; }

        .category-list { display: flex; flex-direction: column; gap: 12px; }
        .category-item { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        [data-theme="dark"] .category-item { background: #0f172a; border-color: #1e293b; }
        .category-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .category-title { font-size: 13px; font-weight: 700; color: var(--text); }
        .category-sub { font-size: 10px; font-weight: 400; color: var(--sub); }
    </style>
</head>
<body data-theme="light">

<div class="app-card" id="appBody">
    <div id="pBarCont" class="progress-container"><div id="progressBar"></div></div>
    
    <div id="authScreen" class="screen" style="display: block; text-align: center;">
        <div style="font-size: 50px; color: #3b82f6; margin-bottom: 5px;"><ion-icon name="water"></ion-icon></div>
        <h1 style="font-size: 26px; margin: 5px 0 30px; line-height: 1.1; font-weight: 800; color: #1e293b;">MASTER PLUMBER <span style="color: #3b82f6;">REVIEWER</span></h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">SIGN IN</button>
        <button onclick="handleRegister()">CREATE ACCOUNT</button>
        <button onclick="enterAsGuest()" style="font-size: 12px; background: transparent; color: #3b82f6; text-decoration: underline;">Continue as Guest</button>
    </div>

    <div id="home" class="screen">
        <div class="new-header">
            <div class="greeting-container">
                <span class="user-greeting">Welcome! 👋</span>
                <span id="newStatus" class="membership-status">FREE MEMBER</span>
            </div>
            <button onclick="toggleTheme()" style="width: 35px; height: 35px; border-radius: 10px; padding: 0; background:var(--btn-ghost);">
                <ion-icon id="themeIcon" name="moon-outline" style="font-size:18px; color: var(--text);"></ion-icon>
            </button>
        </div>

        <div id="proCardCont" class="pro-card">
            <h3>Unlock Lifetime Pro</h3>
            <p style="font-size: 11px; opacity: 0.9;">Access all 60+ exams and detailed analytics.</p>
            <button id="newUpgradeBtn" class="upgrade-btn" onclick="setScreen('paymentScreen')">UPGRADE NOW — ₱299</button>
        </div>

        <h3 style="margin: 0 0 15px; font-size: 15px;">Exam Categories</h3>
        <div class="category-list">
            <div class="category-item" onclick="openExams('Plumbing Code')">
                <div class="category-icon" style="background: var(--cat-icon-code);"><ion-icon name="book-outline" style="color: #0284c7;"></ion-icon></div>
                <div style="flex:1;"><span class="category-title">Plumbing Code</span><br><span class="category-sub">15 Practice Exams</span></div>
                <ion-icon name="chevron-forward-outline"></ion-icon>
            </div>
            <div class="category-item" onclick="openExams('Plumbing Arithmetic')">
                <div class="category-icon" style="background: var(--cat-icon-arith);"><ion-icon name="calculator-outline" style="color: #ef4444;"></ion-icon></div>
                <div style="flex:1;"><span class="category-title">Plumbing Arithmetic</span><br><span class="category-sub">Master calculations</span></div>
                <ion-icon name="chevron-forward-outline"></ion-icon>
            </div>
            <div class="category-item" onclick="openExams('Sanitation Plumbing Design and Installation')">
                <div class="category-icon" style="background: var(--cat-icon-design);"><ion-icon name="construct-outline" style="color: #16a34a;"></ion-icon></div>
                <div style="flex:1;"><span class="category-title">Sanitation & Design</span><br><span class="category-sub">Installation Standards</span></div>
                <ion-icon name="chevron-forward-outline"></ion-icon>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" onclick="setScreen('home')">
                <ion-icon name="home-outline" class="nav-icon"></ion-icon>Home
            </button>
            <button class="nav-item" onclick="alert('Stats coming soon!')">
                <ion-icon name="stats-chart-outline" class="nav-icon"></ion-icon>Stats
            </button>
            <button class="nav-item" onclick="openAccount()">
                <ion-icon name="person-outline" class="nav-icon"></ion-icon>Account
            </button>
        </div>
    </div>

    <div id="account" class="screen">
        <h2 style="text-align: center; margin-bottom: 25px;">About You</h2>
        <div id="accDetails" style="background: var(--btn-ghost); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1.5px solid var(--border);">
            </div>
        <button class="btn-main" onclick="setScreen('home')">BACK TO DASHBOARD</button>
        <button id="accActionBtn" style="background: transparent; color: var(--danger); font-size: 13px; text-decoration: underline; margin-top: 10px;"></button>
    </div>

    <div id="paymentScreen" class="screen" style="text-align: center;">
        <h3>Unlock All Exams</h3>
        <div style="width: 160px; height: 160px; background: white; margin: 15px auto; border: 3px solid #007dfe; border-radius: 15px; padding: 10px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GCASH_PAYMENT" style="width:100%"></div>
        <input type="text" id="licenseKey" placeholder="Enter License Key">
        <button class="btn-main" onclick="verifyKey()">Activate Full Access</button>
        <button onclick="setScreen('home')" style="background:transparent;">Maybe Later</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent);"></h2>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div id="qNum" style="font-size: 11px; font-weight: 800; color: var(--accent);"></div>
            <div id="scoreBox" style="background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 700;">0/0</div>
        </div>
        <div id="qTxt" style="font-size: 16px; font-weight: 600; margin-bottom: 25px;"></div>
        <div id="choices"></div>
        <div style="display:flex; gap:10px;"><button onclick="prevQ()">Back</button><button onclick="handleNextLogic()" class="btn-main">Next</button></div>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center; color: var(--accent);"></h2>
        <div id="revScroll" style="max-height: 380px; overflow-y: auto; background: var(--btn-ghost); border-radius: 20px; padding: 15px; margin-bottom: 15px;"></div>
        <button class="btn-main" onclick="setScreen('home')">Back Home</button>
    </div>
</div>

<script type="module">
    // Mock Data for compilation (replace with your imports)
    const arithmeticDB = { 1: [{q: "Sample Arithmetic?", choices: ["A", "B"], a: 0}] };
    const codeDB = { 1: [{q: "Sample Code?", choices: ["A", "B"], a: 0}] };
    const designDB = { 1: [{q: "Sample Design?", choices: ["A", "B"], a: 0}] };
    const DB = { "Plumbing Arithmetic": arithmeticDB, "Plumbing Code": codeDB, "Sanitation Plumbing Design and Installation": designDB };

    let currentUser = null, isPaid = false, curIdx = 0, currentQs = [], answers = [], score = 0, currentCat = "";
    const MASTER_KEY = "MP-MASTER-2024";

    window.toggleTheme = () => {
        const b = document.body;
        const isL = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isL ? 'dark' : 'light');
        document.getElementById('themeIcon').setAttribute('name', isL ? 'sunny-outline' : 'moon-outline');
    };

    window.enterAsGuest = () => { currentUser = "Guest"; isPaid = false; updateHomeUI(); setScreen('home'); };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u && x.p === p);
        if(user) { currentUser = user.u; isPaid = user.paid; updateHomeUI(); setScreen('home'); }
        else alert("Invalid credentials");
    };

    window.handleRegister = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Fill all fields");
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        users.push({u, p, paid: false});
        localStorage.setItem('mp_users', JSON.stringify(users));
        alert("Account Created!");
    };

    window.openAccount = () => {
        const details = document.getElementById('accDetails');
        const actionBtn = document.getElementById('accActionBtn');
        if (currentUser === "Guest" || !currentUser) {
            details.innerHTML = `<div style="text-align:center;"><ion-icon name="lock-closed" style="font-size:40px; color:var(--sub);"></ion-icon><p>You are logged in as a Guest. Sign in to track progress.</p></div>`;
            actionBtn.innerText = "PLEASE LOG IN TO YOUR ACCOUNT";
            actionBtn.onclick = () => location.reload();
        } else {
            details.innerHTML = `<p><b>Username:</b> ${currentUser}</p><p><b>Status:</b> ${isPaid ? 'PRO MEMBER' : 'FREE MEMBER'}</p>`;
            actionBtn.innerText = "LOGOUT OF ACCOUNT";
            actionBtn.onclick = () => location.reload();
        }
        setScreen('account');
    };

    window.updateHomeUI = () => {
        document.querySelector('.user-greeting').innerText = `Welcome, ${currentUser}! 👋`;
        document.getElementById('newStatus').innerText = isPaid ? "PRO MEMBER" : "FREE MEMBER";
    };

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        if(id === 'home') document.querySelectorAll('.nav-item')[0].classList.add('active');
        if(id === 'account') document.querySelectorAll('.nav-item')[2].classList.add('active');
    };

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const isLocked = (!isPaid && i > 1);
            grid.innerHTML += `<div class="exam-item ${isLocked ? 'locked' : ''}">
                <div style="flex:1;">EXAM #${i} ${isLocked ? '🔒' : ''}</div>
                <button style="width:auto; padding:8px;" onclick="${isLocked ? `alert('Unlock Pro')` : `startQuiz(${i})`}">TAKE</button>
            </div>`;
        }
        setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentQs = DB[currentCat][idx] || [{q: "No questions found.", choices: ["Ok"], a: 0}];
        curIdx = 0; score = 0; answers = new Array(currentQs.length).fill(null);
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const q = currentQs[curIdx];
        document.getElementById('qNum').innerText = `QUESTION ${curIdx+1} OF ${currentQs.length}`;
        document.getElementById('qTxt').innerText = q.q;
        const box = document.getElementById('choices'); box.innerHTML = "";
        q.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            b.onclick = () => { answers[curIdx] = i; score = answers.filter((a, idx) => a === currentQs[idx].a).length; curIdx < currentQs.length-1 ? (curIdx++, loadQ()) : finishQuiz(); };
            box.appendChild(b);
        });
    };

    function finishQuiz() { 
        document.getElementById('resScore').innerText = `Score: ${score}/${currentQs.length}`;
        setScreen('results'); 
    }
</script>
</body>
</html>
