<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --sub: #94a3b8;
            --border: #334155; --glow: rgba(59, 130, 246, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container { width: 100%; max-width: 480px; background: var(--bg); height: 100vh; position: relative; display: flex; flex-direction: column; }

        /* LEFT SIDE SCROLLBAR */
        .screen { 
            display: none; padding: 20px; flex: 1; overflow-y: auto; 
            direction: rtl; text-align: left; padding-bottom: 120px;
        }
        .screen::-webkit-scrollbar { width: 6px; }
        .screen::-webkit-scrollbar-track { background: transparent; }
        .screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .screen > * { direction: ltr; }
        .active-screen { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LOGIN STYLE (Based on Image 1) */
        .login-box { text-align: center; margin-top: 80px; padding: 20px; }
        .login-logo { width: 100px; height: 100px; background: var(--card); border: 2px solid var(--primary); border-radius: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; box-shadow: 0 0 20px var(--glow); }
        .input-field { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: var(--text); margin-bottom: 15px; outline: none; border-left: 4px solid var(--primary); }

        /* HOME DASHBOARD (Based on Image 2) */
        .header-card { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 25px; border-radius: 25px; margin-bottom: 25px; position: relative; overflow: hidden; }
        .header-card::after { content: ''; position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; }

        .subject-card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .subject-card:hover { border-color: var(--primary); transform: translateX(5px); }

        /* PROGRESS RING */
        .ring-container { position: relative; width: 45px; height: 45px; }
        .ring-container svg { transform: rotate(-90deg); width: 45px; height: 45px; }
        .ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
        .ring-fill { fill: none; stroke: var(--success); stroke-width: 4; stroke-linecap: round; transition: 1s; }

        /* NAV STYLING */
        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 30px; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { color: var(--sub); display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item ion-icon { font-size: 24px; }

        /* QUIZ BUTTONS */
        .choice-btn { width: 100%; text-align: left; padding: 16px; margin-bottom: 12px; border-radius: 15px; border: 2px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .choice-btn.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .status-pill { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="authScreen" class="screen active-screen">
        <div class="login-box">
            <div class="login-logo"><ion-icon name="water" style="font-size: 50px; color: var(--primary);"></ion-icon></div>
            <h1 style="margin:0; font-weight:800; letter-spacing:-1px;">MASTER PLUMBER</h1>
            <h3 style="margin:0; color:var(--primary); font-weight:400; margin-bottom:40px;">REVIEWER</h3>
            <input type="text" id="username" class="input-field" placeholder="Enter Full Name">
            <button class="input-field" style="background: var(--primary); border:none; color:white; font-weight:700; cursor:pointer;" onclick="login()">SIGN IN</button>
            <p style="font-size: 12px; color: var(--sub);">Premium Study Access Enabled</p>
        </div>
    </div>

    <div id="home" class="screen">
        <div class="header-card">
            <h2 style="margin:0; font-size: 22px;">Hello, <span id="userNameDisplay">Student</span>!</h2>
            <p style="margin:0; font-size: 12px; opacity: 0.8;">Ready to master the Plumbing Code today?</p>
        </div>
        <h4 style="margin-bottom:15px; font-weight:600;">COURSES</h4>
        <div id="categoryContainer"></div>
    </div>

    <div id="stats" class="screen">
        <h2 style="margin-bottom:20px;">My Stats</h2>
        <div id="statsList"></div>
    </div>

    <div id="exams" class="screen">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
            <ion-icon name="arrow-back" onclick="setScreen('home')" style="font-size:24px; cursor:pointer;"></ion-icon>
            <h3 id="catTitle" style="margin:0"></h3>
        </div>
        <div id="examGrid"></div>
    </div>

    <div id="quiz" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span id="qInfo" style="font-size:12px; font-weight:800; color:var(--primary);"></span>
            <button onclick="alert('Reported')" style="background:none; border:1px solid var(--border); color:var(--sub); font-size:10px; padding:4px 8px; border-radius:5px;">REPORT</button>
        </div>
        <div id="qText" style="font-size:18px; font-weight:600; margin-bottom:30px;"></div>
        <div id="choicesArea"></div>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="choice-btn" style="flex:1; justify-content:center;" onclick="prevQ()">BACK</button>
            <button class="choice-btn" style="flex:2; justify-content:center; background:var(--primary); color:white; border:none; font-weight:700;" id="nextBtn" onclick="nextQ()">NEXT</button>
        </div>
        <div style="display:flex; justify-content:space-around; margin-top:30px;">
            <button onclick="finishEarly()" style="color:var(--success); background:none; border:none; font-weight:700; cursor:pointer;">FINISH</button>
            <button onclick="setScreen('home')" style="color:var(--danger); background:none; border:none; font-weight:700; cursor:pointer;">QUIT</button>
        </div>
    </div>

    <div class="bottom-nav" id="mainNav" style="display:none;">
        <div class="nav-item active" onclick="navTo('home', this)"><ion-icon name="home"></ion-icon>Home</div>
        <div class="nav-item" onclick="navTo('stats', this)"><ion-icon name="analytics"></ion-icon>My Stats</div>
        <div class="nav-item" onclick="location.reload()"><ion-icon name="log-out"></ion-icon>Exit</div>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { practicalDB } from './practical.js';
    import { designDB } from './design.js';

    const DB = {
        "Plumbing Code": codeDB,
        "Plumbing Arithmetic": arithmeticDB,
        "Practical Problems & Experiences": practicalDB,
        "Sanitation, Plumbing Design, and Installation": designDB
    };

    const LOGOS = {
        "Plumbing Code": "book", "Plumbing Arithmetic": "calculator",
        "Practical Problems & Experiences": "hammer", "Sanitation, Plumbing Design, and Installation": "construct"
    };

    let user = "User";
    let curCat = "", curExIdx = 0, curQs = [], curIdx = 0, answers = [];

    window.login = () => {
        user = document.getElementById('username').value || "Professional";
        document.getElementById('userNameDisplay').innerText = user;
        renderHome();
        setScreen('home');
        document.getElementById('mainNav').style.display = 'flex';
    };

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'stats') renderStats();
    };

    window.navTo = (id, el) => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        setScreen(id);
    };

    function renderHome() {
        const cont = document.getElementById('categoryContainer');
        cont.innerHTML = Object.keys(DB).map(cat => `
            <div class="subject-card" onclick="openExams('${cat}')">
                <div style="background:var(--glow); color:var(--primary); padding:12px; border-radius:15px; display:flex;">
                    <ion-icon name="${LOGOS[cat]}" style="font-size:24px;"></ion-icon>
                </div>
                <div style="flex:1">
                    <h4 style="margin:0; font-size:14px;">${cat}</h4>
                    <span style="font-size:11px; color:var(--sub)">15 Exam Modules</span>
                </div>
                <ion-icon name="chevron-forward" style="color:var(--border)"></ion-icon>
            </div>
        `).join('');
    }

    window.openExams = (cat) => {
        curCat = cat;
        document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const high = localStorage.getItem(`high_${user}_${cat}_${i}`) || 0;
            const offset = 125 - (125 * (high / 100));
            grid.innerHTML += `
                <div class="subject-card" onclick="startQuiz('${cat}', ${i})">
                    <div style="flex:1">
                        <h4 style="margin:0">Module #${i}</h4>
                        <p style="margin:0; font-size:11px; color:var(--sub)">Accuracy: ${high}%</p>
                    </div>
                    <div class="ring-container">
                        <svg><circle class="ring-bg" cx="22" cy="22" r="20"/><circle class="ring-fill" cx="22" cy="22" r="20" style="stroke-dasharray: 125; stroke-dashoffset: ${offset};"/></svg>
                        <span style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:9px; font-weight:800;">${high}%</span>
                    </div>
                </div>`;
        }
        setScreen('exams');
    };

    window.startQuiz = (cat, idx) => {
        curExIdx = idx; curQs = DB[cat][idx];
        curIdx = 0; answers = new Array(curQs.length).fill(null);
        setScreen('quiz');
        loadQ();
    };

    function loadQ() {
        const q = curQs[curIdx];
        document.getElementById('qInfo').innerText = `EXAM MODULE ${curExIdx} | Q${curIdx+1}`;
        document.getElementById('qText').innerText = q.q;
        const area = document.getElementById('choicesArea'); area.innerHTML = "";
        q.choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = `choice-btn ${answers[curIdx] === i ? 'active' : ''}`;
            btn.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === q.a) btn.innerHTML += `<span class="status-pill" style="background:var(--success); color:white">Correct</span>`;
                else if(i === answers[curIdx]) btn.innerHTML += `<span class="status-pill" style="background:var(--danger); color:white">Wrong</span>`;
            }
            btn.onclick = () => { answers[curIdx] = i; loadQ(); };
            area.appendChild(btn);
        });
        document.getElementById('nextBtn').innerText = (curIdx === curQs.length-1) ? "FINISH" : "NEXT";
    }

    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };
    window.nextQ = () => { if(curIdx < curQs.length-1) { curIdx++; loadQ(); } else { finishExam(); } };

    function finishExam() {
        let score = 0;
        answers.forEach((a, i) => { if(a === curQs[i].a) score++; });
        const p = Math.round((score/curQs.length)*100);
        const key = `high_${user}_${curCat}_${curExIdx}`;
        if(p > (localStorage.getItem(key)||0)) localStorage.setItem(key, p);
        alert(`Finished!\nAccuracy: ${p}%`);
        openExams(curCat);
    }

    function renderStats() {
        const cont = document.getElementById('statsList'); cont.innerHTML = "";
        Object.keys(DB).forEach(cat => {
            let sum = 0;
            for(let i=1; i<=15; i++) sum += parseInt(localStorage.getItem(`high_${user}_${cat}_${i}`) || 0);
            const avg = Math.round(sum / 15);
            cont.innerHTML += `
                <div class="subject-card" style="cursor:default">
                    <div style="flex:1">
                        <h4 style="margin:0">${cat}</h4>
                        <div style="width:100%; height:6px; background:var(--border); border-radius:10px; margin-top:8px; overflow:hidden;">
                            <div style="width:${avg}%; height:100%; background:var(--primary);"></div>
                        </div>
                    </div>
                    <div style="font-weight:800; color:var(--primary)">${avg}%</div>
                </div>`;
        });
    }

    window.finishEarly = () => { if(confirm("Submit now?")) finishExam(); };
</script>
</body>
</html>
