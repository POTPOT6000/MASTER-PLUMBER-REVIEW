<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER PRO | CENTERED EDITION</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --sub: #94a3b8; --border: #334155; --glow: rgba(59, 130, 246, 0.5);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --glow: rgba(59, 130, 246, 0.2);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.25s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

        /* CENTERED CONTAINER */
        .app-card { 
            width: 100%; max-width: 450px; background: var(--card); padding: 40px; 
            border-radius: 35px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            text-align: center; position: relative;
        }

        /* TOP-RIGHT CORNER TOGGLE */
        .theme-toggle {
            position: absolute; top: 25px; right: 25px; width: 45px; height: 45px;
            border-radius: 14px; border: 1px solid var(--border); background: var(--card);
            color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ENLARGED BUTTONS */
        .btn-large {
            width: 100%; padding: 20px; font-size: 18px; font-weight: 700; border-radius: 20px;
            margin: 10px 0; cursor: pointer; border: none; display: flex; align-items: center;
            justify-content: center; gap: 12px;
        }
        .btn-start { background: var(--accent); color: white; box-shadow: 0 10px 20px var(--glow); }
        .btn-start:hover { transform: scale(1.02); background: #2563eb; }

        .btn-quit { background: rgba(239, 68, 68, 0.1); color: var(--danger); font-size: 13px; }
        .btn-finish { background: rgba(16, 185, 129, 0.1); color: var(--success); font-size: 13px; }

        /* MODAL POPUP */
        .modal-overlay { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 100; border-radius: 35px; align-items: center; justify-content: center; padding: 30px;
        }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--border); width: 100%; }

        .screen { display: none; width: 100%; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .cat-item { 
            padding: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
            cursor: pointer; font-size: 11px; font-weight: 600;
        }
        .cat-item ion-icon { font-size: 30px; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <button class="theme-toggle" onclick="toggleTheme()"><ion-icon id="tIcon" name="sunny-outline"></ion-icon></button>

    <div id="authScreen" class="screen" style="display: block;">
        <ion-icon name="ribbon-outline" style="font-size: 60px; color: var(--accent);"></ion-icon>
        <h1 style="margin: 10px 0 30px 0;">MASTER PLUMBER</h1>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        
        <button class="btn-large btn-start" onclick="handleAuth()">SIGN IN / REGISTER</button>
        <button onclick="enterAsGuest()" style="background:none; border:none; color:var(--sub); cursor:pointer;">Continue as Guest</button>
    </div>

    <div id="home" class="screen">
        <h2 style="margin:0;">Practice Categories</h2>
        <p style="color:var(--sub); font-size:12px;">Select a subject to start your review</p>
        
        <div class="cat-grid">
            <div class="cat-item" onclick="openExams('Plumbing Code')"><ion-icon name="book"></ion-icon><br>Code</div>
            <div class="cat-item" onclick="openExams('Arithmetic')"><ion-icon name="calculator"></ion-icon><br>Math</div>
            <div class="cat-item" onclick="openExams('Design')"><ion-icon name="brush"></ion-icon><br>Design</div>
            <div class="cat-item" onclick="openExams('Practical')"><ion-icon name="hammer"></ion-icon><br>Practical</div>
        </div>
        
        <button class="btn-large" style="background:var(--warning); color:white;" onclick="logout()">LOGOUT</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="color:var(--accent);">Category</h2>
        <div id="examList" style="max-height: 300px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')" style="margin-top:20px; background:none; border:none; color:var(--sub);">Back Home</button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 11px; color: var(--accent);">Question 1/15</div>
        <div id="qTxt" style="font-size: 18px; font-weight: 600; margin: 20px 0;">Sample Question Text?</div>
        
        <div id="choices"></div>

        <div style="display:flex; gap:10px; margin-top: 30px;">
            <button class="btn-large btn-quit" onclick="quitQuiz()">QUIT</button>
            <button class="btn-large btn-finish" onclick="finishEarly()">FINISH</button>
        </div>
    </div>

    <div id="lockModal" class="modal-overlay">
        <div class="modal-content">
            <ion-icon name="lock-closed" style="font-size: 40px; color: var(--warning);"></ion-icon>
            <h3>Content Locked</h3>
            <p style="font-size: 13px; color: var(--sub);">Upgrade to Pro to unlock all 15 exams for this category.</p>
            <button class="btn-large btn-start" onclick="alert('Payment gateway coming soon!')">UPGRADE (₱299)</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:var(--sub);">Maybe Later</button>
        </div>
    </div>
</div>

<script>
    let isPaid = false;
    let currentUser = null;

    function setScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') !== 'light';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('tIcon').setAttribute('name', isDark ? 'moon-outline' : 'sunny-outline');
    }

    function handleAuth() {
        currentUser = document.getElementById('username').value;
        setScreen('home');
    }

    function enterAsGuest() {
        currentUser = "Guest";
        setScreen('home');
    }

    function openExams(cat) {
        document.getElementById('catTitle').innerText = cat;
        const list = document.getElementById('examList');
        list.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const locked = i > 1 && !isPaid;
            list.innerHTML += `
                <button class="btn-large ${locked ? 'locked' : ''}" style="background:var(--bg); border:1px solid var(--border); color:var(--text);" onclick="handleStartClick(${locked})">
                    Exam #${i} ${locked ? '🔒' : '▶️'}
                </button>
            `;
        }
        setScreen('exams');
    }

    // "START" ACTION: WON'T OPEN QUESTIONS IF LOCKED
    function handleStartClick(isLocked) {
        if(isLocked) {
            document.getElementById('lockModal').style.display = 'flex';
        } else {
            setScreen('quiz');
        }
    }

    function closeModal() { document.getElementById('lockModal').style.display = 'none'; }
    function quitQuiz() { if(confirm("Quit to dashboard?")) setScreen('home'); }
    function finishEarly() { if(confirm("Submit your answers now?")) setScreen('home'); }
    function logout() { location.reload(); }
</script>

</body>
</html>
