<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --sub: #64748b;
            --border: #e2e8f0; --glow: rgba(37, 99, 235, 0.2);
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --border: #334155; --sub: #94a3b8; --glow: rgba(59, 130, 246, 0.4);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .app-container { width: 100%; max-width: 480px; background: var(--bg); min-height: 100vh; position: relative; padding-bottom: 90px; }

        .screen { display: none; padding: 25px; animation: slideUp 0.4s ease-out; }
        .active-screen { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* INTERACTIVE BUTTONS */
        .btn-blue { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px var(--glow); filter: brightness(1.1); }
        .btn-blue:active { transform: scale(0.98); }

        .btn-outline { 
            background: var(--card); color: var(--text); border: 2px solid var(--border); 
            padding: 16px; border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer; 
        }
        .btn-outline:hover { border-color: var(--accent); background: var(--bg); color: var(--accent); transform: translateY(-2px); }

        /* CHOICE BUTTONS */
        .choice-btn { 
            width: 100%; text-align: left; padding: 18px; margin-bottom: 12px; 
            border: 2px solid var(--border); border-radius: 16px; background: var(--card); 
            color: var(--text); font-weight: 500; cursor: pointer; position: relative;
        }
        .choice-btn:hover { border-color: var(--accent); transform: translateX(5px); box-shadow: -5px 0 0 var(--accent); }
        .choice-selected { border-color: var(--primary) !important; background: var(--glow) !important; font-weight: 700; }

        /* PROGRESS BAR */
        .p-bar-wrapper { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 6px; background: var(--border); z-index: 1000; }
        #progressFill { height: 100%; background: linear-gradient(to right, var(--primary), var(--success)); width: 0%; transition: width 0.4s ease; }

        /* CATEGORY CARDS */
        .cat-card { 
            background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); 
            margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px;
        }
        .cat-card:hover { transform: scale(1.02); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 10px 0; z-index: 999; }
        .nav-item { flex: 1; text-align: center; color: var(--sub); cursor: pointer; font-size: 11px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-item ion-icon { font-size: 24px; display: block; margin: 0 auto 3px; }

        /* REVIEW CARD */
        .review-item { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <div class="p-bar-wrapper" id="pWrapper" style="display:none;"><div id="progressFill"></div></div>

    <div id="authScreen" class="screen active-screen">
        <div style="text-align: center; padding-top: 60px;">
            <div style="background: var(--glow); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <ion-icon name="water" style="font-size: 45px; color: var(--accent);"></ion-icon>
            </div>
            <h1 style="margin: 0; font-size: 28px; letter-spacing: -1px;">PLUMBER <span style="color:var(--accent)">PRO</span></h1>
            <p style="color: var(--sub); margin-bottom: 40px;">Interactive Master Reviewer</p>
            
            <input type="text" id="username" placeholder="Reviewer Name" style="width:100%; padding:18px; border-radius:15px; border:2px solid var(--border); background:var(--card); color:var(--text); margin-bottom:20px; outline:none;">
            <button class="btn-blue" onclick="handleLogin()">GET STARTED</button>
        </div>
    </div>

    <div id="home" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <div><h2 style="margin:0">Dashboard</h2><p id="welcomeUser" style="margin:0; color:var(--sub); font-size:14px;"></p></div>
            <button onclick="toggleTheme()" style="background:var(--card); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:12px; cursor:pointer;">
                <ion-icon id="themeIcon" name="sunny-outline" style="font-size:20px;"></ion-icon>
            </button>
        </div>
        <div id="catContainer"></div>
    </div>

    <div id="examList" class="screen">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
            <ion-icon name="chevron-back" onclick="setScreen('home')" style="font-size:24px; cursor:pointer; color:var(--accent)"></ion-icon>
            <h2 id="catTitle" style="margin:0">Category</h2>
        </div>
        <div id="gridContainer"></div>
    </div>

    <div id="quiz" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span id="qCounter" style="font-weight:800; color:var(--accent); font-size:13px;">Q 1/10</span>
            <span style="background:var(--success); color:white; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700;">LIVE EXAM</span>
        </div>
        
        <div id="qText" style="font-size:18px; font-weight:600; line-height:1.5; margin-bottom:25px; min-height:80px;">Question...</div>
        
        <div id="choicesArea"></div>

        <div style="display:flex; gap:12px; margin-top:30px;">
            <button class="btn-outline" id="backBtn" onclick="prevQuestion()" style="flex:1">BACK</button>
            <button class="btn-blue" id="nextBtn" onclick="nextQuestion()" style="flex:2">NEXT</button>
        </div>
        
        <button class="btn-outline" onclick="confirmQuit()" style="margin-top:15px; border-color:var(--danger); color:var(--danger); font-size:12px; padding:12px;">QUIT EXAM</button>
    </div>

    <div id="review" class="screen">
        <h2 style="text-align:center; margin-bottom:10px;">Exam Results</h2>
        <div style="background:var(--card); border:2px solid var(--primary); padding:30px; border-radius:25px; text-align:center; margin-bottom:30px;">
            <div id="resPercent" style="font-size:52px; font-weight:800; color:var(--primary)">0%</div>
            <div id="resFraction" style="font-weight:600; color:var(--sub)">0 / 0 Correct</div>
        </div>
        
        <div id="reviewList"></div>
        
        <button class="btn-blue" onclick="setScreen('home')">CONTINUE REVIEWING</button>
    </div>

    <div class="nav-bar" id="bottomNav" style="display:none;">
        <div class="nav-item active" onclick="setScreen('home')"><ion-icon name="grid-outline"></ion-icon>Categories</div>
        <div class="nav-item" onclick="location.reload()"><ion-icon name="log-out-outline"></ion-icon>Logout</div>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB_MAP = {
        "Plumbing Code": codeDB,
        "Plumbing Arithmetic": arithmeticDB,
        "Sanitation & Design": designDB,
        "Practical Problems": practicalDB
    };

    let currentUser = "Guest";
    let activeCat = "";
    let activeQs = [];
    let curIdx = 0;
    let userAnswers = []; // Stores user selections

    // THEME TOGGLE
    window.toggleTheme = () => {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        if(body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
            icon.setAttribute('name', 'moon-outline');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.setAttribute('name', 'sunny-outline');
        }
    };

    // NAVIGATION
    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        document.getElementById('bottomNav').style.display = (id === 'authScreen' || id === 'quiz') ? 'none' : 'flex';
        document.getElementById('pWrapper').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.handleLogin = () => {
        const u = document.getElementById('username').value || "Future Master Plumber";
        currentUser = u;
        document.getElementById('welcomeUser').innerText = u;
        renderHome();
        setScreen('home');
    };

    function renderHome() {
        const container = document.getElementById('catContainer');
        container.innerHTML = Object.keys(DB_MAP).map(cat => `
            <div class="cat-card" onclick="openExams('${cat}')">
                <div style="background:var(--glow); padding:12px; border-radius:12px; color:var(--accent);">
                    <ion-icon name="book-outline" style="font-size:24px;"></ion-icon>
                </div>
                <div style="flex:1">
                    <h4 style="margin:0">${cat}</h4>
                    <p style="margin:0; font-size:12px; color:var(--sub)">15 Exam Modules</p>
                </div>
                <ion-icon name="chevron-forward" style="color:var(--border)"></ion-icon>
            </div>
        `).join('');
    }

    window.openExams = (cat) => {
        activeCat = cat;
        document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('gridContainer');
        grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            grid.innerHTML += `
                <div style="background:var(--card); border:1px solid var(--border); padding:15px; border-radius:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600">Module #${i}</span>
                    <button class="btn-blue" style="width:auto; padding:8px 20px; font-size:12px;" onclick="startQuiz('${cat}', ${i})">START</button>
                </div>
            `;
        }
        setScreen('examList');
    };

    window.startQuiz = (cat, idx) => {
        activeQs = DB_MAP[cat][idx] || [];
        if(activeQs.length === 0) return alert("Database not found for this module.");
        
        curIdx = 0;
        userAnswers = new Array(activeQs.length).fill(null);
        setScreen('quiz');
        renderQuestion();
    };

    function renderQuestion() {
        const q = activeQs[curIdx];
        document.getElementById('qCounter').innerText = `QUESTION ${curIdx + 1} / ${activeQs.length}`;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('progressFill').style.width = `${((curIdx + 1) / activeQs.length) * 100}%`;
        
        document.getElementById('backBtn').style.opacity = curIdx === 0 ? "0.3" : "1";
        document.getElementById('nextBtn').innerText = (curIdx === activeQs.length - 1) ? "FINISH" : "NEXT";

        const area = document.getElementById('choicesArea');
        area.innerHTML = "";
        q.choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = `choice-btn ${userAnswers[curIdx] === i ? 'choice-selected' : ''}`;
            btn.innerText = c;
            btn.onclick = () => {
                userAnswers[curIdx] = i;
                renderQuestion(); // Re-render to show selection
            };
            area.appendChild(btn);
        });
    }

    window.prevQuestion = () => { if(curIdx > 0) { curIdx--; renderQuestion(); } };

    window.nextQuestion = () => {
        if(curIdx < activeQs.length - 1) { curIdx++; renderQuestion(); }
        else { showResults(); }
    };

    function showResults() {
        let score = 0;
        const list = document.getElementById('reviewList');
        list.innerHTML = "";

        activeQs.forEach((q, i) => {
            const correct = userAnswers[i] === q.a;
            if(correct) score++;

            let choicesHtml = q.choices.map((choice, ci) => {
                let color = "";
                if(ci === q.a) color = "color:var(--success); font-weight:bold;";
                else if(ci === userAnswers[i] && !correct) color = "color:var(--danger); text-decoration:line-through;";
                return `<div style="font-size:13px; margin:5px 0; ${color}">${choice}</div>`;
            }).join('');

            list.innerHTML += `
                <div class="review-item">
                    <div style="font-size:14px; font-weight:700; margin-bottom:10px;">Q${i+1}: ${q.q}</div>
                    ${choicesHtml}
                    <div style="margin-top:10px; font-size:11px; font-weight:800; color:${correct ? 'var(--success)' : 'var(--danger)'}">
                        ${userAnswers[i] === null ? "SKIPPED" : (correct ? "✓ CORRECT" : "✗ INCORRECT")}
                    </div>
                </div>
            `;
        });

        const percent = Math.round((score / activeQs.length) * 100);
        document.getElementById('resPercent').innerText = `${percent}%`;
        document.getElementById('resFraction').innerText = `${score} / ${activeQs.length} Correct`;
        setScreen('review');
    }

    window.confirmQuit = () => { if(confirm("End exam? All progress will be lost.")) setScreen('home'); };

</script>
</body>
</html>
