<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
            --orange: #f97316; --light-blue: #bae6fd; --dark-blue: #1d4ed8;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --warning: #fbbf24; --bg: #020617; --card: #0f172a; --text: #f1f5f9;
            --sub: #94a3b8; --border: #1e293b; --btn-ghost: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.2s ease-in-out; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden;
        }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        @keyframes successPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate-wrong { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-right { animation: successPop 0.4s ease-out both; }

        button { 
            width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 16px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); 
            color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-main { background: var(--accent); color: #fff !important; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--btn-ghost); display: none; z-index: 20; }
        #progressBar { height: 100%; background: var(--accent); width: 0%; transition: 0.4s ease; }
        
        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--danger) !important; color: white !important; }
        .status-text { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        .exam-row { display: flex; flex-direction: column; margin-bottom: 12px; background: var(--btn-ghost); border-radius: 18px; padding: 5px; }
        .btn-eye { width: 50px; background: var(--warning); color: #fff !important; font-size: 20px; margin: 0; }
        .locked-exam { opacity: 0.5; }
    </style>
</head>
<body data-theme="light">

<div class="app-card" id="appBody">
    <div id="pBarCont" class="progress-container"><div id="progressBar"></div></div>
    
    <div class="controls" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10;">
        <div id="scoreBox" style="background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 700; display: none;">0/0</div>
        <button onclick="toggleTheme()" style="width: 40px; height: 40px; border-radius: 12px; padding: 0;"><ion-icon id="themeIcon" name="moon-outline"></ion-icon></button>
    </div>

    <div id="authScreen" class="screen" style="display: block; text-align: center;">
        <div style="width: 70px; height: 70px; background: var(--accent); color: white; margin: 0 auto 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px;">
            <ion-icon name="school-outline"></ion-icon>
        </div>
        <h1 style="font-size: 18px;">MASTER PLUMBER REVIEWER</h1>
        <button class="btn-main" onclick="enterAsGuest()">ENTER AS GUEST</button>
        <div style="margin: 15px 0; font-size: 11px; color: var(--sub);">OR LOGIN FOR PRO ACCESS</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Login / Register</button>
    </div>

    <div id="paymentScreen" class="screen" style="text-align: center;">
        <h3>Unlock All Exams</h3>
        <div style="width: 150px; height: 150px; background: white; margin: 15px auto; border: 2px solid #007dfe; border-radius: 10px; padding: 5px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GCASH_09123456789" style="width:100%">
        </div>
        <p style="font-size: 14px; font-weight: 700; color: #007dfe; margin:0;">GCash: 09XX XXX XXXX</p>
        <input type="text" id="licenseKey" placeholder="Enter License Key">
        <button class="btn-main" onclick="verifyKey()">Activate Pro</button>
        <button onclick="setScreen('home')" style="background:transparent; font-size:12px;">Back to Menu</button>
    </div>

    <div id="home" class="screen">
        <div style="text-align: center; margin-bottom: 20px;">
            <h1 style="font-size: 18px; margin-bottom: 0;">MASTER PLUMBER REVIEWER</h1>
            <p id="userStatus" style="font-size: 11px; font-weight: 700; margin-top: 5px;"></p>
        </div>
        <button class="btn-main" onclick="openExams('Plumbing Code')">Plumbing Code</button>
        <button class="btn-main" onclick="openExams('Plumbing Arithmetic')">Plumbing Arithmetic</button>
        <button class="btn-main" onclick="openExams('Sanitation Plumbing Design and Installation')">Sanitation & Design</button>
        <button class="btn-main" onclick="openExams('Practical Problems and Experiences')">Practical Problems</button>
        
        <button id="upgradeBtn" onclick="setScreen('paymentScreen')" style="background: var(--warning); color:white;">Upgrade to PRO</button>
        <button onclick="logout()" style="margin-top: 20px; border: 1px solid var(--border); color: var(--danger); font-size: 12px;">Logout / Exit</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent);"></h2>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 10px; font-weight: 800; color: var(--accent);"></div>
        <div id="qTxt" style="font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 15px;"></div>
        <span id="qStatus" class="status-text"></span>
        <div id="choices"></div>
        
        <div style="display:flex; gap:10px;">
            <button onclick="prevQ()" style="flex:1">Back</button>
            <button onclick="handleNextLogic()" style="flex:2" class="btn-main">Next</button>
        </div>

        <div style="display:flex; gap:10px; margin-top: 5px;">
            <button onclick="quitQuiz()" style="font-size:11px; flex:1; color:var(--danger)">Quit Exam</button>
            <button onclick="finishExamEarly()" style="font-size:11px; flex:1; color:var(--success)">Finish Exam</button>
        </div>
        <button onclick="alert('Report submitted for Review.')" style="font-size:11px; background:transparent; color:var(--sub)">Report Question</button>
    </div>

    <div id="results" class="screen">
        <h2 id="resTitle" style="text-align: center; margin-bottom: 5px;">Results</h2>
        <h2 id="resScore" style="text-align: center; color: var(--accent); margin-top: 0;"></h2>
        <div id="revScroll" style="max-height: 350px; overflow-y: auto; background: var(--btn-ghost); border-radius: 16px; padding: 10px;"></div>
        <button class="btn-main" onclick="setScreen('home')">Back to Home</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB, "Plumbing Code": codeDB,
        "Sanitation Plumbing Design and Installation": designDB, "Practical Problems and Experiences": practicalDB
    };

    let currentUser = null, isPaid = false, currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0;
    const MASTER_KEY = "MP-MASTER-2024";

    window.toggleTheme = () => {
        const b = document.body;
        const isLight = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('themeIcon').setAttribute('name', isLight ? 'sunny-outline' : 'moon-outline');
    };

    window.enterAsGuest = () => { currentUser = "Guest"; isPaid = false; updateHomeUI(); setScreen('home'); };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Enter credentials");
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u);
        if(!user) {
            user = { u, p, paid: false }; users.push(user);
            localStorage.setItem('mp_users', JSON.stringify(users));
        } else if(user.p !== p) return alert("Wrong password");
        currentUser = user.u; isPaid = user.paid; updateHomeUI(); setScreen('home');
    };

    function updateHomeUI() {
        const status = document.getElementById('userStatus');
        status.innerText = isPaid ? `PRO ACCOUNT: ${currentUser}` : "GUEST MODE (Exam 1 Only)";
        status.style.color = isPaid ? "var(--success)" : "var(--warning)";
        document.getElementById('upgradeBtn').style.display = isPaid ? "none" : "block";
    }

    window.verifyKey = () => {
        if(document.getElementById('licenseKey').value === MASTER_KEY) {
            isPaid = true;
            if(currentUser !== "Guest") {
                let users = JSON.parse(localStorage.getItem('mp_users'));
                users.find(x => x.u === currentUser).paid = true;
                localStorage.setItem('mp_users', JSON.stringify(users));
            }
            alert("PRO Unlocked!"); updateHomeUI(); setScreen('home');
        } else alert("Invalid Key");
    };

    window.logout = () => location.reload();

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.display = (id === 'quiz') ? 'block' : 'none';
        document.getElementById('pBarCont').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const isLocked = (!isPaid && i > 1);
            grid.innerHTML += `
                <div class="exam-row ${isLocked ? 'locked-exam' : ''}">
                    <div style="display:flex; gap:8px;">
                        <button style="background:transparent; text-align:left; flex:1; margin:0;" onclick="${isLocked ? `alert('Upgrade to Pro to unlock Exam #${i}')` : `startQuiz(${i})`}">
                            EXAM #${i} ${isLocked ? '🔒' : ''}
                        </button>
                        <button class="btn-eye" onclick="${isLocked ? `alert('Locked')` : `showReview(${i}, true)`}"><ion-icon name="eye-outline"></ion-icon></button>
                    </div>
                </div>`;
        }
        setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx; currentQs = [...DB[currentCat][idx]];
        curIdx = 0; answers = new Array(currentQs.length).fill(null); score = 0;
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const qData = currentQs[curIdx];
        const status = document.getElementById('qStatus');
        document.getElementById('progressBar').style.width = ((curIdx) / currentQs.length * 100) + "%";
        document.getElementById('qNum').innerText = `EXAM #${currentExamIdx} • Q${curIdx+1}`;
        document.getElementById('qTxt').innerText = qData.q;
        status.innerText = "";
        const box = document.getElementById('choices'); box.innerHTML = "";
        qData.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === qData.a) { b.classList.add('correct'); if(answers[curIdx] === i) status.innerText = "Correct!"; }
                else if(i === answers[curIdx]) { b.classList.add('wrong'); status.innerText = "Wrong!"; }
                b.disabled = true;
            } else {
                b.onclick = () => {
                    answers[curIdx] = i;
                    const isCorrect = i === qData.a;
                    document.getElementById('appBody').classList.add(isCorrect ? 'animate-right' : 'animate-wrong');
                    setTimeout(() => document.getElementById('appBody').classList.remove('animate-right', 'animate-wrong'), 400);
                    score = answers.filter((a, i) => a === currentQs[i].a).length;
                    document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
                    loadQ();
                };
            }
            box.appendChild(b);
        });
    };

    window.handleNextLogic = () => {
        if(curIdx < currentQs.length - 1) { curIdx++; loadQ(); }
        else finishExamEarly();
    };

    window.finishExamEarly = () => { if(confirm("Finish Exam and see results?")) showReview(null, false); };
    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };
    window.quitQuiz = () => { if(confirm("Quit Quiz and return to menu?")) setScreen('home'); };

    window.showReview = (idx, isStudy) => {
        const examIdx = idx || currentExamIdx;
        const qs = isStudy ? DB[currentCat][examIdx] : currentQs;
        const ansList = isStudy ? new Array(qs.length).fill(null) : answers;
        document.getElementById('resScore').innerText = isStudy ? "" : `Final Score: ${score} / ${qs.length}`;
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        qs.forEach((q, i) => {
            let choiceHtml = "";
            q.choices.forEach((c, ci) => {
                let cls = (ci === q.a) ? "correct" : (ci === ansList[i] ? "wrong" : "");
                choiceHtml += `<div class="rev-choice" style="font-size:12px; padding:6px; margin:2px; border-radius:8px; background:var(--bg); ${cls==='correct'?'background:var(--success); color:white;':''} ${cls==='wrong'?'background:var(--danger); color:white;':''}">${c}</div>`;
            });
            scroll.innerHTML += `<div style="padding:15px; border-bottom:1px solid var(--border); margin-bottom:10px;"><b>${i+1}. ${q.q}</b>${choiceHtml}</div>`;
        });
        setScreen('results');
    };
</script>
</body>
</html>
