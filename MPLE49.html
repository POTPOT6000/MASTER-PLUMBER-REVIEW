<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #2563eb; --bg-light: #f8fafc; --card-white: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b; --border-light: #e2e8f0;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.2s ease; }
        body { background: var(--bg-light); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; }

        .app-container { width: 100%; max-width: 450px; background: var(--bg-light); min-height: 100vh; position: relative; display: flex; flex-direction: column; padding-bottom: 80px; }

        /* SCREENS */
        .screen { display: none; padding: 0; height: 100vh; overflow-y: auto; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* AUTH SCREEN */
        .auth-container { padding: 40px 25px; text-align: center; }
        .logo-box ion-icon { font-size: 64px; color: var(--primary-blue); }
        .title-brand { font-weight: 800; font-size: 26px; line-height: 1.1; margin-bottom: 40px; }
        .title-brand span { color: var(--primary-blue); display: block; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-left: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin-top: 5px; border: 2px solid var(--border-light); border-radius: 12px; background: white; font-size: 14px; outline: none; }

        /* BUTTONS */
        .btn-blue { background: var(--primary-blue); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; }
        .btn-outline { background: white; color: var(--text-sub); border: 2px solid var(--border-light); padding: 16px; border-radius: 15px; width: 100%; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-danger { background: #fee2e2; color: var(--danger); border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; }

        /* CATEGORIES & EXAMS */
        .category-list { padding: 0 20px; }
        .cat-item { background: white; padding: 20px; border-radius: 20px; display: flex; align-items: center; margin-bottom: 12px; border: 1px solid var(--border-light); cursor: pointer; }
        .cat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 24px; }
        .exam-row { display: flex; align-items: center; padding: 18px; background: white; margin-bottom: 10px; border-radius: 20px; border: 1px solid var(--border-light); justify-content: space-between; }
        
        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid var(--border-light); display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { text-align: center; color: var(--text-sub); font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary-blue); font-weight: 700; }
        .nav-item ion-icon { font-size: 26px; display: block; margin: 0 auto 2px; }

        /* QUIZ STYLES */
        #pBarCont { position: fixed; top: 0; left: 0; width: 100%; max-width: 450px; height: 6px; background: var(--border-light); z-index: 1000; display: none; margin: 0 auto; left: 50%; transform: translateX(-50%);}
        #progressBar { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
        .choice-btn { width: 100%; text-align: left; padding: 16px; margin-bottom: 10px; border: 2px solid var(--border-light); border-radius: 15px; background: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        .choice-correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .choice-wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        #feedbackTxt { text-align: center; font-weight: 800; font-size: 16px; margin: 10px 0; height: 24px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="pBarCont"><div id="progressBar"></div></div>

    <div id="authScreen" class="screen active-screen">
        <div class="auth-container">
            <div class="logo-box"><ion-icon name="water"></ion-icon></div>
            <div style="font-size: 11px; font-weight: 700; color: var(--primary-blue); letter-spacing: 1px;">THE ULTIMATE REVIEWER</div>
            <h1 class="title-brand">MASTER PLUMBER<br><span>REVIEWER</span></h1>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="future_engineer">
            </div>
            
            <button class="btn-blue" onclick="handleAuth()">SIGN IN TO YOUR ACCOUNT</button>
            <div style="margin: 20px 0; color: var(--text-sub); font-size: 12px; font-weight: 700;">OR</div>
            <button class="btn-outline" onclick="enterAsGuest()" style="border: none;">CONTINUE AS GUEST</button>
        </div>
    </div>

    <div id="home" class="screen">
        <div style="padding: 25px; display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h2 id="welcomeTxt" style="margin: 0;">Welcome! 👋</h2>
                <p id="userRank" style="color: var(--text-sub); margin: 0; font-size: 13px;">Reviewer Dashboard</p>
            </div>
            <ion-icon name="moon-outline" style="font-size: 24px;"></ion-icon>
        </div>
        <h3 style="padding: 0 25px; margin-bottom: 15px; font-size: 18px;">Exam Categories</h3>
        <div class="category-list" id="catList"></div>
    </div>

    <div id="stats" class="screen" style="padding: 25px;">
        <h2 style="margin-top: 0;">Your Statistics</h2>
        <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--border-light);">
            <div style="font-size: 12px; color: var(--text-sub); text-transform: uppercase;">Overall Accuracy</div>
            <div id="avgScore" style="font-size: 48px; font-weight: 800; color: var(--primary-blue);">0%</div>
            <p id="totalExamsTaken" style="font-size: 13px; color: var(--text-sub);">No exams completed yet.</p>
        </div>
    </div>

    <div id="account" class="screen" style="padding: 25px;">
        <h2 style="margin-top: 0;">My Account</h2>
        <div style="background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--border-light); margin-bottom: 20px; text-align: center;">
            <div style="width: 80px; height: 80px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--text-sub);">
                <ion-icon name="person"></ion-icon>
            </div>
            <h3 id="accUsername" style="margin: 0;">User</h3>
            <p style="color: var(--text-sub); font-size: 14px; margin: 5px 0 20px;">Free Account</p>
            <button class="btn-outline" style="margin: 0; padding: 10px;">Edit Profile</button>
        </div>
        <button class="btn-danger" onclick="logout()">
            <ion-icon name="log-out-outline" style="vertical-align: middle; margin-right: 8px;"></ion-icon>
            LOGOUT
        </button>
    </div>

    <div id="exams" class="screen" style="padding: 20px;">
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <ion-icon name="chevron-back" style="font-size: 24px; cursor: pointer;" onclick="setScreen('home')"></ion-icon>
            <h2 id="catTitle" style="margin: 0 0 0 10px; font-size: 18px; color: var(--primary-blue);">Category</h2>
        </div>
        <div id="examGrid"></div>
    </div>

    <div id="quiz" class="screen" style="padding: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <div id="qNum" style="font-size: 12px; font-weight: 800; color: var(--primary-blue);">QUESTION 1 / 100</div>
            <div id="liveScore" style="font-size: 12px; font-weight: 800; color: var(--success);">Score: 0</div>
        </div>
        
        <div id="qTxt" style="font-size: 18px; font-weight: 600; margin: 20px 0;">Question goes here...</div>
        
        <div id="feedbackTxt"></div>
        <div id="choicesBox"></div>
        
        <button id="nextBtn" class="btn-blue" onclick="handleNextLogic()" style="margin-top: 20px; display: none;">Next Question</button>
        
        <button class="btn-outline" onclick="quitQuiz()" style="margin-top: 15px; border-color: var(--danger); color: var(--danger);">Quit Exam</button>
    </div>

    <div class="nav-bar" id="mainNav" style="display: none;">
        <div class="nav-item active" onclick="navTo('home', this)"><ion-icon name="home"></ion-icon>Home</div>
        <div class="nav-item" onclick="navTo('stats', this)"><ion-icon name="analytics-outline"></ion-icon>Stats</div>
        <div class="nav-item" onclick="navTo('account', this)"><ion-icon name="person-outline"></ion-icon>Profile</div>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB, 
        "Plumbing Code": codeDB,
        "Sanitation & Design": designDB, 
        "Practical Problems": practicalDB
    };

    const categories = [
        { id: 'Plumbing Code', icon: 'book', color: '#eff6ff', textColor: '#3b82f6' },
        { id: 'Plumbing Arithmetic', icon: 'calculator', color: '#fff1f2', textColor: '#ef4444' },
        { id: 'Sanitation & Design', icon: 'construct', color: '#f0fdf4', textColor: '#22c55e' },
        { id: 'Practical Problems', icon: 'hammer', color: '#fffbeb', textColor: '#f59e0b' }
    ];

    let currentUser = null;
    let currentCat = null, currentExamIdx = null, currentQs = [], curIdx = 0, score = 0, answers = [];

    // Navigation & Init
    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        
        // Hide nav bar inside Quiz and Auth screens
        document.getElementById('mainNav').style.display = (id === 'authScreen' || id === 'quiz') ? 'none' : 'flex';
        document.getElementById('pBarCont').style.display = (id === 'quiz') ? 'block' : 'none';
        
        if(id === 'stats') updateStats();
    };

    window.navTo = (id, el) => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        setScreen(id);
    };

    window.enterAsGuest = () => { currentUser = "Guest"; completeLogin(); };
    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        if(!u) return alert("Please enter a username.");
        currentUser = u; completeLogin();
    };

    function completeLogin() {
        document.getElementById('welcomeTxt').innerText = `Welcome, ${currentUser}! 👋`;
        document.getElementById('accUsername').innerText = currentUser;
        renderCategories();
        setScreen('home');
    }

    function renderCategories() {
        const list = document.getElementById('catList');
        list.innerHTML = categories.map(cat => `
            <div class="cat-item" onclick="openExams('${cat.id}')">
                <div class="cat-icon" style="background: ${cat.color}; color: ${cat.textColor};"><ion-icon name="${cat.icon}"></ion-icon></div>
                <div style="flex:1">
                    <h4 style="margin:0; font-size:16px;">${cat.id}</h4>
                    <p style="margin:0; font-size:12px; color:var(--text-sub)">15 Practice Exams</p>
                </div>
                <ion-icon name="chevron-forward-outline" style="color:var(--text-sub)"></ion-icon>
            </div>
        `).join('');
    }

    // Exam Selection
    window.openExams = (catId) => {
        currentCat = catId;
        document.getElementById('catTitle').innerText = catId;
        const grid = document.getElementById('examGrid');
        grid.innerHTML = "";
        
        for(let i=1; i<=15; i++) {
            const bestScore = localStorage.getItem(`best_${currentUser}_${catId}_${i}`) || "--";
            
            grid.innerHTML += `
                <div class="exam-row">
                    <div class="exam-info">
                        EXAM #${i}
                        <span style="font-size:11px; font-weight:400; color:var(--text-sub); display:block;">Best Score: ${bestScore}%</span>
                    </div>
                    <button class="btn-blue" style="width:auto; padding: 10px 20px; margin:0;" onclick="startQuiz('${catId}', ${i})">START</button>
                </div>`;
        }
        setScreen('exams');
    };

    // Quiz Logic
    window.startQuiz = (cat, idx) => {
        if(!DB[cat] || !DB[cat][idx] || DB[cat][idx].length === 0) {
            alert(`No questions loaded for ${cat} Exam #${idx} yet. Check your .js files.`);
            return;
        }

        currentCat = cat; currentExamIdx = idx;
        currentQs = DB[cat][idx]; // Load questions directly from the imported DB
        curIdx = 0; score = 0; answers = new Array(currentQs.length).fill(null);
        
        setScreen('quiz');
        loadQ();
    };

    window.loadQ = () => {
        const q = currentQs[curIdx];
        const feedback = document.getElementById('feedbackTxt');
        const nextBtn = document.getElementById('nextBtn');
        const choicesBox = document.getElementById('choicesBox');
        
        document.getElementById('qNum').innerText = `QUESTION ${curIdx + 1} / ${currentQs.length}`;
        document.getElementById('liveScore').innerText = `Score: ${score}`;
        document.getElementById('qTxt').innerText = q.q;
        document.getElementById('progressBar').style.width = ((curIdx + 1) / currentQs.length * 100) + "%";
        
        feedback.innerText = "";
        nextBtn.style.display = "none";
        choicesBox.innerHTML = "";

        q.choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = c;
            
            if(answers[curIdx] !== null) {
                // If returning to a previously answered question
                if(i === q.a) btn.classList.add('choice-correct');
                else if(i === answers[curIdx]) btn.classList.add('choice-wrong');
                btn.disabled = true;
                nextBtn.style.display = "block";
            } else {
                // Not answered yet
                btn.onclick = () => handleAnswerSelect(i, btn);
            }
            choicesBox.appendChild(btn);
        });
    };

    function handleAnswerSelect(selectedIdx, clickedBtn) {
        const q = currentQs[curIdx];
        answers[curIdx] = selectedIdx;
        const box = document.getElementById('choicesBox');
        const feedback = document.getElementById('feedbackTxt');
        
        // Disable all buttons
        Array.from(box.children).forEach(b => b.disabled = true);

        if(selectedIdx === q.a) {
            clickedBtn.classList.add('choice-correct');
            feedback.innerText = "Correct!"; feedback.style.color = "var(--success)";
            score++;
            document.getElementById('liveScore').innerText = `Score: ${score}`;
        } else {
            clickedBtn.classList.add('choice-wrong');
            box.children[q.a].classList.add('choice-correct'); // Reveal correct
            feedback.innerText = "Incorrect"; feedback.style.color = "var(--danger)";
        }

        document.getElementById('nextBtn').style.display = "block";
        document.getElementById('nextBtn').innerText = (curIdx === currentQs.length - 1) ? "Finish Exam" : "Next Question";
    }

    window.handleNextLogic = () => {
        if(curIdx < currentQs.length - 1) {
            curIdx++;
            loadQ();
        } else {
            finishQuiz();
        }
    };

    window.quitQuiz = () => {
        if(confirm("Are you sure you want to quit? Your progress won't be saved.")) openExams(currentCat);
    };

    function finishQuiz() {
        const percentage = Math.round((score / currentQs.length) * 100);
        const prevBest = localStorage.getItem(`best_${currentUser}_${currentCat}_${currentExamIdx}`) || 0;
        
        // Save new high score
        if(percentage > prevBest) {
            localStorage.setItem(`best_${currentUser}_${currentCat}_${currentExamIdx}`, percentage);
        }

        // Add to historical stats
        let rawHistory = JSON.parse(localStorage.getItem(`history_${currentUser}`) || '[]');
        rawHistory.push(percentage);
        localStorage.setItem(`history_${currentUser}`, JSON.stringify(rawHistory));

        alert(`Exam Complete! You scored ${score} out of ${currentQs.length} (${percentage}%).`);
        openExams(currentCat);
    }

    // Stats Logic
    function updateStats() {
        const rawHistory = JSON.parse(localStorage.getItem(`history_${currentUser}`) || '[]');
        const count = rawHistory.length;
        
        if (count === 0) {
            document.getElementById('avgScore').innerText = "0%";
            document.getElementById('totalExamsTaken').innerText = "No exams completed yet.";
            return;
        }

        const total = rawHistory.reduce((acc, curr) => acc + curr, 0);
        const avg = Math.round(total / count);

        document.getElementById('avgScore').innerText = `${avg}%`;
        document.getElementById('totalExamsTaken').innerText = `${count} total exam(s) completed`;
    }

    window.logout = () => { if(confirm("Are you sure you want to log out?")) location.reload(); };

</script>
</body>
</html>
