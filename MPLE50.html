<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #2563eb; --bg-light: #f8fafc; --card-white: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b; --border-light: #e2e8f0;
            --success: #10b981; --danger: #ef4444;
        }

        [data-theme="dark"] {
            --primary-blue: #3b82f6; --bg-light: #0f172a; --card-white: #1e293b;
            --text-main: #f8fafc; --text-sub: #94a3b8; --border-light: #334155;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.2s; }
        body { background: var(--bg-light); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: var(--bg-light); min-height: 100vh; position: relative; padding-bottom: 80px; }

        .screen { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .btn-blue { background: var(--primary-blue); color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; }
        .btn-outline { background: transparent; color: var(--text-main); border: 2px solid var(--border-light); padding: 16px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; }
        
        /* Quiz Layout */
        .quiz-nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .choice-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; border: 2px solid var(--border-light); border-radius: 12px; background: var(--card-white); color: var(--text-main); font-weight: 600; cursor: pointer; }
        .choice-selected { border-color: var(--primary-blue); background: rgba(59, 130, 246, 0.1); }
        .choice-correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .choice-wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        /* Review */
        .review-card { background: var(--card-white); padding: 15px; border-radius: 15px; border: 1px solid var(--border-light); margin-bottom: 15px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--card-white); border-top: 1px solid var(--border-light); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { text-align: center; color: var(--text-sub); font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary-blue); font-weight: 700; }
        
        #progressBar { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; height: 6px; background: var(--border-light); }
        #progressFill { height: 100%; background: var(--primary-blue); width: 0%; transition: 0.3s; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <div id="progressBar" style="display:none;"><div id="progressFill"></div></div>

    <div id="authScreen" class="screen active-screen">
        <div style="text-align: center; padding-top: 50px;">
            <ion-icon name="water" style="font-size: 60px; color: var(--primary-blue);"></ion-icon>
            <h1 style="margin-top: 10px;">MASTER PLUMBER<br><span style="color:var(--primary-blue)">REVIEWER PRO</span></h1>
            <input type="text" id="username" placeholder="Enter Username" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border-light); margin-bottom:15px;">
            <button class="btn-blue" onclick="handleLogin()">START REVIEWING</button>
        </div>
    </div>

    <div id="home" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="welcomeTxt">Welcome!</h2>
            <ion-icon id="themeIcon" name="moon-outline" style="font-size:24px; cursor:pointer;" onclick="toggleTheme()"></ion-icon>
        </div>
        <div id="catList"></div>
    </div>

    <div id="exams" class="screen">
        <div style="display:flex; align-items:center; margin-bottom:20px;">
            <ion-icon name="arrow-back" style="font-size:24px; cursor:pointer;" onclick="setScreen('home')"></ion-icon>
            <h2 id="catTitle" style="margin-left:15px;">Exams</h2>
        </div>
        <div id="examGrid"></div>
    </div>

    <div id="quiz" class="screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span id="qNum" style="font-weight:700; font-size:12px; color:var(--primary-blue)">Q1/15</span>
            <span id="liveScore" style="font-weight:700; font-size:12px; color:var(--success)">Points: 0</span>
        </div>
        <div id="qTxt" style="font-size:18px; font-weight:600; margin-bottom:20px;">Loading question...</div>
        <div id="choicesBox"></div>
        
        <div class="quiz-nav-btns">
            <button class="btn-outline" id="backBtn" onclick="prevQ()">BACK</button>
            <button class="btn-blue" id="nextBtn" onclick="nextQ()">NEXT</button>
        </div>
        <button class="btn-outline" style="margin-top:15px; border-color:var(--danger); color:var(--danger);" onclick="confirmQuit()">QUIT EXAM</button>
    </div>

    <div id="review" class="screen">
        <h2 style="text-align:center;">Exam Results</h2>
        <div style="background:var(--card-white); padding:20px; border-radius:15px; text-align:center; border:1px solid var(--border-light); margin-bottom:20px;">
            <div id="finalScore" style="font-size:48px; font-weight:800; color:var(--primary-blue)">0%</div>
            <p id="scoreFraction">0 / 0 Questions Correct</p>
        </div>
        <div id="reviewList"></div>
        <button class="btn-blue" onclick="setScreen('home')">BACK TO HOME</button>
    </div>

    <div class="nav-bar" id="mainNav" style="display:none;">
        <div class="nav-item active" onclick="setScreen('home')"><ion-icon name="home-outline" style="font-size:20px;"></ion-icon><div>Home</div></div>
        <div class="nav-item" onclick="logout()"><ion-icon name="log-out-outline" style="font-size:20px;"></ion-icon><div>Logout</div></div>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Code": codeDB,
        "Plumbing Arithmetic": arithmeticDB,
        "Sanitation & Design": designDB,
        "Practical Problems": practicalDB
    };

    let currentUser = "Guest";
    let currentCat = "", currentExamIdx = 0, currentQs = [], curIdx = 0;
    let userAnswers = []; // Stores indices of selected answers

    // Theme logic
    window.toggleTheme = () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeIcon').setAttribute('name', isDark ? 'moon-outline' : 'sunny-outline');
    };

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        document.getElementById('mainNav').style.display = (id==='authScreen' || id==='quiz') ? 'none' : 'flex';
        document.getElementById('progressBar').style.display = (id==='quiz') ? 'block' : 'none';
    };

    window.handleLogin = () => {
        const u = document.getElementById('username').value || "Guest";
        currentUser = u;
        document.getElementById('welcomeTxt').innerText = `Hello, ${u}!`;
        renderCats();
        setScreen('home');
    };

    function renderCats() {
        const list = document.getElementById('catList');
        list.innerHTML = Object.keys(DB).map(cat => `
            <div style="background:var(--card-white); padding:20px; border-radius:15px; margin-top:10px; border:1px solid var(--border-light); cursor:pointer;" onclick="showExams('${cat}')">
                <h4 style="margin:0">${cat}</h4>
                <p style="margin:0; font-size:12px; color:var(--text-sub)">15 Practice Exams</p>
            </div>
        `).join('');
    }

    window.showExams = (cat) => {
        currentCat = cat;
        document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid');
        grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            grid.innerHTML += `
                <div style="background:var(--card-white); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border-light);">
                    <span>Exam #${i}</span>
                    <button class="btn-blue" style="width:auto; padding:8px 20px;" onclick="startQuiz('${cat}', ${i})">START</button>
                </div>`;
        }
        setScreen('exams');
    };

    window.startQuiz = (cat, idx) => {
        currentQs = DB[cat][idx] || [];
        if(currentQs.length === 0) return alert("Exam database not found for this index.");
        
        curIdx = 0;
        userAnswers = new Array(currentQs.length).fill(null);
        setScreen('quiz');
        loadQuestion();
    };

    function loadQuestion() {
        const q = currentQs[curIdx];
        document.getElementById('qNum').innerText = `QUESTION ${curIdx + 1} / ${currentQs.length}`;
        document.getElementById('qTxt').innerText = q.q;
        document.getElementById('progressFill').style.width = `${((curIdx + 1) / currentQs.length) * 100}%`;
        
        // Show/Hide Back Button
        document.getElementById('backBtn').style.visibility = curIdx === 0 ? "hidden" : "visible";
        document.getElementById('nextBtn').innerText = curIdx === currentQs.length - 1 ? "FINISH EXAM" : "NEXT";

        const box = document.getElementById('choicesBox');
        box.innerHTML = "";
        q.choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = `choice-btn ${userAnswers[curIdx] === i ? 'choice-selected' : ''}`;
            btn.innerText = c;
            btn.onclick = () => selectChoice(i);
            box.appendChild(btn);
        });
        updateLiveScore();
    }

    function selectChoice(i) {
        userAnswers[curIdx] = i;
        loadQuestion(); // Refresh UI to show selection
    }

    window.prevQ = () => {
        if(curIdx > 0) { curIdx--; loadQuestion(); }
    };

    window.nextQ = () => {
        if(curIdx < currentQs.length - 1) {
            curIdx++;
            loadQuestion();
        } else {
            finishExam();
        }
    };

    function updateLiveScore() {
        let s = 0;
        userAnswers.forEach((ans, i) => {
            if(ans !== null && ans === currentQs[i].a) s++;
        });
        document.getElementById('liveScore').innerText = `Points: ${s}`;
    }

    function finishExam() {
        let correctCount = 0;
        const list = document.getElementById('reviewList');
        list.innerHTML = "";

        currentQs.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.a;
            if(isCorrect) correctCount++;

            let choicesHtml = q.choices.map((c, ci) => {
                let style = "";
                if(ci === q.a) style = "color:var(--success); font-weight:700;";
                else if(ci === userAnswers[i] && !isCorrect) style = "color:var(--danger); text-decoration:line-through;";
                return `<div style="font-size:13px; margin:4px 0; ${style}">${c}</div>`;
            }).join('');

            list.innerHTML += `
                <div class="review-card">
                    <div style="font-size:14px; font-weight:600; margin-bottom:5px;">Q${i+1}: ${q.q}</div>
                    ${choicesHtml}
                    <div style="font-size:11px; margin-top:8px; color:${isCorrect ? 'var(--success)' : 'var(--danger)'}">
                        ${userAnswers[i] === null ? "SKIPPED" : (isCorrect ? "CORRECT" : "INCORRECT")}
                    </div>
                </div>`;
        });

        const percent = Math.round((correctCount / currentQs.length) * 100);
        document.getElementById('finalScore').innerText = `${percent}%`;
        document.getElementById('scoreFraction').innerText = `${correctCount} / ${currentQs.length} Correct`;
        setScreen('review');
    }

    window.confirmQuit = () => {
        if(confirm("Quit exam? Progress will be lost.")) setScreen('home');
    };

    window.logout = () => location.reload();

</script>
</body>
</html>
