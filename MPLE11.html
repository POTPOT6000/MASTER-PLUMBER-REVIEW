<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: #1e293b; --btn-ghost: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden;
        }

        /* Interactive Animations */
        button { 
            width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 16px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); 
            color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        button:not(:disabled):hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.2);
            background: var(--border);
        }

        button:active { transform: scale(0.95); }

        .btn-main { background: var(--accent); color: #fff !important; }
        .btn-main:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        /* Status Glows */
        .correct { 
            background: var(--success) !important; color: white !important; 
            box-shadow: 0 0 15px var(--success) !important; transform: scale(1.02);
        }
        .wrong { 
            background: var(--danger) !important; color: white !important; 
            box-shadow: 0 0 15px var(--danger) !important;
        }

        /* Footer Special Glows */
        .btn-quit:hover { box-shadow: 0 0 15px rgba(239, 68, 68, 0.5) !important; color: var(--danger) !important; border-color: var(--danger); }
        .btn-finish:hover { box-shadow: 0 0 15px rgba(16, 185, 129, 0.5) !important; color: var(--success) !important; border-color: var(--success); }

        #ansFeedback { 
            font-size: 13px; font-weight: 700; text-align: center; 
            margin: 15px 0; min-height: 20px; border-radius: 10px; padding: 5px;
        }

        .screen { display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--btn-ghost); }
        #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body data-theme="light">

<div class="app-card">
    <div class="progress-container"><div id="progressBar"></div></div>
    
    <div style="text-align: right; margin-bottom: 20px;">
        <span id="scoreBox" style="background: var(--accent); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; display: none;">0/0</span>
    </div>

    <div id="home" class="screen" style="display: block;">
        <h1 style="text-align: center; font-size: 20px;">MASTER PLUMBER REVIEWER</h1>
        <button class="btn-main" onclick="openExams('Plumbing Arithmetic')">Plumbing Arithmetic</button>
        <button class="btn-main" onclick="openExams('Plumbing Code')">Plumbing Code</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent);"></h2>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 11px; font-weight: bold; color: var(--sub);"></div>
        <div id="qTxt" style="font-size: 16px; font-weight: 600; margin: 20px 0;"></div>
        <div id="choices"></div>
        <div id="ansFeedback"></div>
        
        <div style="display:flex; gap:10px;">
            <button id="bBtn" onclick="prevQ()" style="flex:1">Back</button>
            <button id="nBtn" onclick="nextQ()" style="flex:2" class="btn-main">Next</button>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn-quit" style="background:none; border: 1px solid var(--border); font-size: 12px;" onclick="setScreen('exams')">Quit Exam</button>
            <button class="btn-finish" style="background:none; border: 1px solid var(--border); font-size: 12px;" onclick="finishExamEarly()">Finish Exam</button>
        </div>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center;"></h2>
        <div id="revScroll" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn-main" onclick="setScreen('home')">Finish</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    const DB = { "Plumbing Arithmetic": arithmeticDB };

    let currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0;

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.display = (id === 'quiz') ? 'inline-block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat;
        document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const hasData = DB[cat][i];
            const hs = localStorage.getItem(`HS_${cat}_${i}`) || 0;
            grid.innerHTML += `
                <button onclick="${hasData ? `startQuiz(${i})` : `alert('Coming Soon')`}" style="justify-content: space-between;">
                    <span>EXAM #${i}</span>
                    <span style="font-size: 10px; color: var(--sub);">Best: ${hs}</span>
                </button>`;
        }
        window.setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx;
        currentQs = [...DB[currentCat][idx]];
        curIdx = 0; score = 0; answers = new Array(currentQs.length).fill(null);
        document.getElementById('scoreBox').innerText = `0 / ${currentQs.length}`;
        window.setScreen('quiz'); window.loadQ();
    };

    window.loadQ = () => {
        const qData = currentQs[curIdx];
        document.getElementById('progressBar').style.width = ((curIdx / currentQs.length) * 100) + "%";
        document.getElementById('qNum').innerText = `QUESTION ${curIdx + 1} OF ${currentQs.length}`;
        document.getElementById('qTxt').innerText = qData.q;
        document.getElementById('ansFeedback').innerText = "";
        
        const box = document.getElementById('choices'); box.innerHTML = "";
        qData.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            
            // Re-apply visual state if navigating back/forward
            if(answers[curIdx] !== null) {
                b.disabled = true;
                if(i === qData.a) b.classList.add('correct');
                else if(i === answers[curIdx]) b.classList.add('wrong');
            }

            b.onclick = () => handleAnswer(i, b);
            box.appendChild(b);
        });
    };

    function handleAnswer(choiceIdx, btn) {
        const qData = currentQs[curIdx];
        answers[curIdx] = choiceIdx;
        const feedback = document.getElementById('ansFeedback');
        
        // Disable all buttons in current question
        Array.from(document.getElementById('choices').children).forEach(b => b.disabled = true);

        if(choiceIdx === qData.a) {
            btn.classList.add('correct');
            feedback.innerText = "✨ Correct Answer!";
            feedback.style.color = "var(--success)";
            score++;
        } else {
            btn.classList.add('wrong');
            feedback.innerText = "❌ Incorrect.";
            feedback.style.color = "var(--danger)";
            // Highlight the right one too
            Array.from(document.getElementById('choices').children)[qData.a].classList.add('correct');
        }
        document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
    }

    window.nextQ = () => {
        if(curIdx < currentQs.length - 1) { curIdx++; window.loadQ(); }
        else finishExam();
    };

    window.prevQ = () => { if(curIdx > 0) { curIdx--; window.loadQ(); } };

    function finishExam() {
        const prevHS = localStorage.getItem(`HS_${currentCat}_${currentExamIdx}`) || 0;
        if(score > prevHS) localStorage.setItem(`HS_${currentCat}_${currentExamIdx}`, score);
        document.getElementById('resScore').innerText = `EXAM COMPLETE: ${score} / ${currentQs.length}`;
        window.setScreen('results');
    }

    window.finishExamEarly = () => { if(confirm("End exam now?")) finishExam(); };
</script>
</body>
</html>
