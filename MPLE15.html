<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: #1e293b; --btn-ghost: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden; height: fit-content;
        }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        @keyframes successPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate-wrong { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-right { animation: successPop 0.4s ease-out both; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        input:focus { border-color: var(--accent); }

        button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 16px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--accent); color: #fff !important; }
        .btn-gcash { background: #007dfe; color: white !important; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--danger) !important; color: white !important; }
        .status-text { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .status-correct { color: var(--success); }
        .status-wrong { color: var(--danger); }
        .status-skipped { color: var(--warning); }

        .rev-item { padding: 15px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .rev-choice { font-size: 12px; padding: 6px; border-radius: 8px; margin: 2px 0; background: var(--bg); }
        
        .qr-box { width: 180px; height: 180px; background: white; margin: 15px auto; border: 3px solid #007dfe; border-radius: 12px; padding: 10px; }
        .qr-box img { width: 100%; height: 100%; }
        #scoreBox { position: absolute; top: 20px; right: 20px; background: var(--accent); color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; display: none; }
    </style>
</head>
<body data-theme="light">

<div class="app-card" id="appBody">
    <div id="scoreBox">0/0</div>

    <div id="authScreen" class="screen" style="display: block;">
        <div style="text-align: center; margin-bottom: 20px;">
            <ion-icon name="person-circle-outline" style="font-size: 60px; color: var(--accent);"></ion-icon>
            <h2 id="authTitle" style="margin:0">Login</h2>
        </div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" id="primaryAuthBtn" onclick="handleAuth()">Login</button>
        <button style="background:transparent; font-size: 12px;" onclick="toggleAuthMode()" id="toggleAuthBtn">New? Create Account</button>
    </div>

    <div id="paymentScreen" class="screen">
        <div style="text-align: center;">
            <h3 style="margin-bottom:5px;">Unlock Full Access</h3>
            <p style="font-size: 11px; color: var(--sub);">Pay via GCash for instant exam access.</p>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=GCASH_09123456789" alt="QR">
            </div>
            <p style="font-size: 14px; font-weight: 700; color: #007dfe; margin:0;">GCash: 09XX XXX XXXX</p>
            <input type="text" id="licenseKey" placeholder="Enter License Key (Instant)">
            <button class="btn-main" onclick="verifyKey()">Activate Key</button>
            <div style="margin: 10px 0; font-size: 10px; color: var(--sub);">--- OR ---</div>
            <button class="btn-gcash" onclick="verifyPayment()">Manual Verification</button>
            <button onclick="logout()" style="background:transparent; font-size:12px; color:var(--danger)">Logout</button>
        </div>
    </div>

    <div id="home" class="screen">
        <h1 style="font-size: 18px; text-align: center;">MASTER PLUMBER REVIEWER</h1>
        <p id="userGreeting" style="text-align: center; font-size: 12px; color: var(--accent); font-weight: 600;"></p>
        <button class="btn-main" onclick="openExams('Plumbing Code')">Plumbing Code</button>
        <button class="btn-main" onclick="openExams('Plumbing Arithmetic')">Plumbing Arithmetic</button>
        <button class="btn-main" onclick="openExams('Sanitation Plumbing Design and Installation')">Sanitation & Design</button>
        <button class="btn-main" onclick="openExams('Practical Problems and Experiences')">Practical Problems</button>
        <button onclick="logout()" style="margin-top: 20px; border: 1px solid var(--border); color: var(--danger);">Logout</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent);"></h2>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 10px; font-weight: 800; color: var(--accent);"></div>
        <div id="qTxt" style="font-size: 16px; font-weight: 600; margin: 15px 0;"></div>
        <span id="qStatus" class="status-text"></span>
        <div id="choices"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="prevQ()">Back</button>
            <button onclick="handleNextLogic()" class="btn-main">Next</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:5px;">
            <button onclick="quitQuiz()" style="font-size:11px; flex:1">Quit</button>
            <button onclick="finishExamEarly()" style="font-size:11px; flex:1">Finish</button>
        </div>
    </div>

    <div id="results" class="screen">
        <h2 id="resTitle" style="text-align: center; margin-bottom:5px;"></h2>
        <h2 id="resScore" style="text-align: center; color: var(--accent); margin-top:0;"></h2>
        <div id="revScroll" style="max-height: 350px; overflow-y: auto; background: var(--btn-ghost); border-radius: 16px; padding: 10px;"></div>
        <button class="btn-main" id="retakeBtn" onclick="retakeCurrentExam()">Retake Exam</button>
        <button onclick="setScreen('home')">Home</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB, "Plumbing Code": codeDB,
        "Sanitation Plumbing Design and Installation": designDB, "Practical Problems and Experiences": practicalDB
    };

    let currentUser = null, authMode = 'login', currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0;
    const VALID_KEYS = ["PRO-2024", "MP-REVIEW-2025"]; // Example keys for instant access

    // AUTH
    window.toggleAuthMode = () => {
        authMode = (authMode === 'login') ? 'register' : 'login';
        document.getElementById('authTitle').innerText = authMode.toUpperCase();
        document.getElementById('primaryAuthBtn').innerText = authMode.toUpperCase();
        document.getElementById('toggleAuthBtn').innerText = (authMode === 'login') ? "New? Create Account" : "Have an account? Login";
    };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Fill all fields");
        let users = JSON.parse(localStorage.getItem('reviewer_users') || '[]');
        if(authMode === 'register'){
            if(users.find(x=>x.u===u)) return alert("User exists");
            users.push({u, p, paid: false});
            localStorage.setItem('reviewer_users', JSON.stringify(users));
            alert("Registered! Please login."); toggleAuthMode();
        } else {
            const user = users.find(x=>x.u===u && x.p===p);
            if(user) { currentUser = user; checkAccess(); } else alert("Wrong credentials");
        }
    };

    const checkAccess = () => {
        if(currentUser.paid) { document.getElementById('userGreeting').innerText = `Hello, ${currentUser.u}`; setScreen('home'); }
        else setScreen('paymentScreen');
    };

    window.verifyKey = () => {
        const key = document.getElementById('licenseKey').value.trim();
        if(VALID_KEYS.includes(key)) {
            unlockUser(); alert("License Activated! Enjoy full access.");
        } else alert("Invalid Key");
    };

    window.verifyPayment = () => { if(confirm("Confirm: Have you sent GCash payment?")) { unlockUser(); alert("Payment verified!"); } };

    function unlockUser() {
        let users = JSON.parse(localStorage.getItem('reviewer_users'));
        const idx = users.findIndex(x=>x.u===currentUser.u);
        users[idx].paid = true;
        localStorage.setItem('reviewer_users', JSON.stringify(users));
        currentUser.paid = true; checkAccess();
    }

    window.logout = () => { currentUser = null; setScreen('authScreen'); };

    // CORE LOGIC
    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat.toUpperCase();
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++){
            const hasQs = DB[cat][i] && DB[cat][i].length > 0;
            grid.innerHTML += `<div style="display:flex; gap:5px;"><button onclick="${hasQs ? `startQuiz(${i})` : `alert('Coming soon')`}" style="flex:1; text-align:left;">EXAM #${i}</button><button class="btn-main" style="width:50px" onclick="showReview(${i}, true)"><ion-icon name="eye-outline"></ion-icon></button></div>`;
        }
        setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx; currentQs = [...DB[currentCat][idx]];
        curIdx = 0; answers = new Array(currentQs.length).fill(null); score = 0;
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const qData = currentQs[curIdx];
        const status = document.getElementById('qStatus');
        const card = document.getElementById('appBody');
        document.getElementById('qNum').innerText = `Q${curIdx+1} / ${currentQs.length}`;
        document.getElementById('qTxt').innerText = qData.q;
        status.innerText = ""; status.className = "status-text";
        card.classList.remove('animate-wrong', 'animate-right');
        
        const box = document.getElementById('choices'); box.innerHTML = "";
        qData.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === qData.a) { b.classList.add('correct'); if(answers[curIdx] === i) { status.innerText = "Right!"; status.classList.add('status-correct'); } }
                else if(i === answers[curIdx]) { b.classList.add('wrong'); status.innerText = "Wrong!"; status.classList.add('status-wrong'); }
                b.disabled = true;
            } else {
                b.onclick = () => {
                    answers[curIdx] = i;
                    if(i === qData.a) card.classList.add('animate-right'); else card.classList.add('animate-wrong');
                    updateScore(); loadQ();
                };
            }
            box.appendChild(b);
        });
    };

    function updateScore() {
        score = answers.filter((a, i) => a === currentQs[i].a).length;
        document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
    }

    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };
    window.handleNextLogic = () => { if(curIdx < currentQs.length - 1) { curIdx++; loadQ(); } else finishExamEarly(); };
    window.quitQuiz = () => { if(confirm("Are you sure you want to quit?")) setScreen('home'); };
    window.finishExamEarly = () => { if(confirm("Finish and see results?")) { showReview(null, false); } };

    window.showReview = (idx, isStudy) => {
        const examIdx = idx || currentExamIdx;
        const qs = isStudy ? DB[currentCat][examIdx] : currentQs;
        const ansList = isStudy ? new Array(qs.length).fill(null) : answers;
        document.getElementById('resTitle').innerText = isStudy ? `STUDY: EXAM #${examIdx}` : "EXAM RESULTS";
        document.getElementById('resScore').innerText = isStudy ? "" : `${score} / ${qs.length}`;
        document.getElementById('retakeBtn').style.display = isStudy ? "none" : "block";
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        qs.forEach((q, i) => {
            let choiceHtml = "";
            q.choices.forEach((c, ci) => {
                let cls = ""; if(ci === q.a) cls = "correct"; else if(ci === ansList[i]) cls = "wrong";
                choiceHtml += `<div class="rev-choice ${cls}">${c}</div>`;
            });
            scroll.innerHTML += `<div class="rev-item"><b>${i+1}. ${q.q}</b>${choiceHtml}</div>`;
        });
        setScreen('results');
    };

    window.retakeCurrentExam = () => startQuiz(currentExamIdx);
</script>
</body>
</html>
