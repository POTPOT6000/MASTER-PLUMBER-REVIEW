<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
            --orange: #f97316; --light-blue: #bae6fd; --dark-blue: #1d4ed8;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --warning: #fbbf24; --bg: #020617; --card: #0f172a; --text: #f1f5f9;
            --sub: #94a3b8; --border: #1e293b; --btn-ghost: #1e293b;
            --light-blue: #0369a1; --dark-blue: #1e40af;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative;
        }

        .controls { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 10px; }
        .theme-switch { 
            background: var(--btn-ghost); color: var(--text); width: 40px; height: 40px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; 
        }
        .score-display { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 700; display: none; }

        .brand { text-align: center; margin-bottom: 30px; margin-top: 15px; }
        .logo-box { width: 70px; height: 70px; background: var(--accent); color: white; margin: 0 auto 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        
        .screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 16px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--accent); color: #fff !important; }
        
        /* NEXT BUTTON ACTIVE STATE */
        #nBtn:active { background: var(--dark-blue) !important; transform: scale(0.98); }

        .btn-next-answered { background: var(--light-blue) !important; color: #000 !important; }
        .btn-back-answered { background: var(--orange) !important; color: #fff !important; }

        /* QUIT BUTTON STYLING */
        .btn-quit-bottom { background: transparent; border: 1.5px solid var(--border); color: var(--sub); margin-top: 5px; height: 45px; }
        .btn-quit-bottom:active { color: var(--danger); border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .exam-row { display: flex; gap: 10px; }
        .btn-exam { background: var(--card); border: 2px solid var(--border); flex: 1; color: var(--text); font-weight: 700; }
        .btn-eye { width: 60px; background: var(--warning); color: #fff !important; font-size: 20px; }

        .correct { background: var(--success) !important; color: white !important; border: none !important; }
        .wrong { background: var(--danger) !important; color: white !important; border: none !important; }

        #ansFeedback { font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 10px; min-height: 18px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: var(--card); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
        
        #qImg { width: 100%; border-radius: 15px; margin-bottom: 15px; display: none; object-fit: contain; max-height: 250px; background: #eee; }
    </style>
</head>
<body data-theme="light">

<div id="reportModal" class="modal-overlay">
    <div class="modal">
        <h3>Report Question</h3>
        <select id="reportType" style="width:100%; padding:10px; margin:10px 0; border-radius: 8px;">
            <option>Wrong Answer</option>
            <option>Typo in Question</option>
        </select>
        <textarea id="reportDetails" style="width:100%; padding:10px; border-radius: 8px;" rows="4" placeholder="Details..."></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeReport()">Cancel</button>
            <button class="btn-main" style="justify-content:center; padding:0;" onclick="submitReport()">Submit</button>
        </div>
    </div>
</div>

<div class="app-card" id="appBody">
    <div class="controls">
        <div id="scoreBox" class="score-display">0/0</div>
        <button class="theme-switch" onclick="toggleTheme()"><ion-icon id="themeIcon" name="moon-outline"></ion-icon></button>
    </div>

    <div class="brand">
        <div class="logo-box"><ion-icon name="school-outline"></ion-icon></div>
        <h1 style="font-size: 18px;">MASTER PLUMBER REVIEWER</h1>
        <div style="font-size: 11px; color: var(--sub); font-weight: 600;">Engr. Jay Tristan Medallon, MP</div>
    </div>

    <div id="home" class="screen" style="display: block;">
        <button class="btn-main" onclick="openExams('Plumbing Code')">Plumbing Code</button>
        <button class="btn-main" onclick="openExams('Plumbing Arithmetic')">Plumbing Arithmetic</button>
        <button class="btn-main" onclick="openExams('Sanitation Plumbing Design and Installation')">Sanitation & Design</button>
        <button class="btn-main" onclick="openExams('Practical Problems and Experiences')">Practical Problems</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent); margin-bottom: 20px;"></h2>
        <div id="examGrid" style="max-height: 380px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div class="q-header">
            <div id="qNum" style="font-size: 10px; font-weight: 800; color: var(--accent);"></div>
            <button style="background:transparent; color:var(--sub); width:auto; padding:4px 8px; border:1px solid var(--border); font-size:10px; border-radius:8px;" onclick="openReport()">Report</button>
        </div>
        <img id="qImg" src="" alt="Question Diagram">
        <div id="qTxt" style="font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 25px;"></div>
        <div id="choices"></div>
        <div id="ansFeedback"></div>
        
        <div style="display:flex; gap:10px;">
            <button id="bBtn" onclick="prevQ()" style="flex:1">Back</button>
            <button id="nBtn" onclick="handleNextLogic()" style="flex:2" class="btn-main">Next</button>
        </div>
        <button class="btn-quit-bottom" onclick="quitQuiz()">Quit Exam</button>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center;"></h2>
        <div id="revScroll" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn-main" onclick="retakeCurrentExam()">Retake Exam</button>
        <button onclick="backToExamList()">Back to Exams</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB,
        "Plumbing Code": codeDB,
        "Sanitation Plumbing Design and Installation": designDB,
        "Practical Problems and Experiences": practicalDB
    };

    let currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0, isRevealed = false;

    window.toggleTheme = () => {
        const b = document.body;
        const isLight = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('themeIcon').setAttribute('name', isLight ? 'sunny-outline' : 'moon-outline');
    };

    window.openReport = () => { document.getElementById('reportModal').style.display = 'flex'; };
    window.closeReport = () => { document.getElementById('reportModal').style.display = 'none'; };
    window.submitReport = () => {
        const type = document.getElementById('reportType').value;
        const msg = document.getElementById('reportDetails').value;
        fetch("https://formspree.io/f/YOUR_ID_HERE", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ category: currentCat, exam: currentExamIdx, question: currentQs[curIdx].q, issue: type, details: msg })
        }).then(() => { alert("Sent!"); window.closeReport(); });
    };

    window.quitQuiz = () => {
        if(confirm("Exit this exam? Your current score won't be saved.")) {
            window.openExams(currentCat);
        }
    };

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat;
        document.getElementById('catTitle').innerText = cat.toUpperCase();
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        const categoryData = DB[cat] || {};
        const totalExams = Object.keys(categoryData).length;

        for(let i=1; i<=totalExams; i++) {
            grid.innerHTML += `
                <div class="exam-row">
                    <button class="btn-exam" onclick="startQuiz(${i})">EXAM #${i}</button>
                    <button class="btn-eye" onclick="showReview(${i}, true)"><ion-icon name="eye-outline"></ion-icon></button>
                </div>`;
        }
        window.setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx;
        currentQs = DB[currentCat][idx];
        curIdx = 0; 
        answers = new Array(currentQs.length).fill(null);
        isRevealed = false;
        window.setScreen('quiz'); 
        window.loadQ();
    };

    window.loadQ = () => {
        isRevealed = false;
        const nBtn = document.getElementById('nBtn');
        const bBtn = document.getElementById('bBtn');
        
        nBtn.classList.remove('btn-next-answered');
        bBtn.classList.remove('btn-back-answered');
        nBtn.innerText = (curIdx === currentQs.length - 1) ? "Finish" : "Next";
        
        document.getElementById('ansFeedback').innerText = "";
        const qData = currentQs[curIdx];
        
        document.getElementById('qNum').innerText = `EXAM #${currentExamIdx} • Q${curIdx+1}`;
        document.getElementById('qTxt').innerText = qData.q;

        const imgBox = document.getElementById('qImg');
        imgBox.style.display = qData.img ? "block" : "none";
        if(qData.img) imgBox.src = "images/" + qData.img;

        const box = document.getElementById('choices'); 
        box.innerHTML = "";
        
        qData.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null && answers[curIdx] !== -1) {
                b.disabled = true;
                if(i === qData.a) b.classList.add('correct');
                else if(i === answers[curIdx]) b.classList.add('wrong');
                nBtn.classList.add('btn-next-answered');
                bBtn.classList.add('btn-back-answered');
            }
            b.onclick = () => {
                answers[curIdx] = i;
                Array.from(box.children).forEach(btn => btn.style.border = "none");
                b.style.border = "2px solid var(--accent)";
                updateScore();
            };
            box.appendChild(b);
        });
    };

    window.prevQ = () => { curIdx === 0 ? window.openExams(currentCat) : (curIdx--, window.loadQ()); };
    
    window.handleNextLogic = () => {
        if(answers[curIdx] === null && !isRevealed) {
            answers[curIdx] = -1; 
            updateScore();
        }

        if(!isRevealed) { 
            revealCurrentAnswer(); 
            isRevealed = true; 
            return; 
        }
        
        if(curIdx < currentQs.length - 1) { 
            curIdx++; 
            window.loadQ(); 
        } else { 
            window.showReview(null, false); 
        }
    };

    function revealCurrentAnswer() {
        const qData = currentQs[curIdx];
        const box = document.getElementById('choices');
        const feedback = document.getElementById('ansFeedback');
        
        document.getElementById('nBtn').classList.add('btn-next-answered');
        document.getElementById('bBtn').classList.add('btn-back-answered');

        Array.from(box.children).forEach((btn, i) => {
            btn.disabled = true;
            btn.style.border = "none";
            if(i === qData.a) btn.classList.add('correct');
            else if(i === answers[curIdx]) btn.classList.add('wrong');
        });

        if(answers[curIdx] === -1) {
            feedback.innerText = "Skipped! Correct Answer: " + qData.choices[qData.a];
            feedback.style.color = "var(--warning)";
        } else {
            feedback.innerText = (answers[curIdx] === qData.a) ? "Correct!" : "Wrong! Answer: " + qData.choices[qData.a];
            feedback.style.color = (answers[curIdx] === qData.a) ? "var(--success)" : "var(--danger)";
        }
    }

    function updateScore() {
        score = answers.filter((a, i) => (currentQs[i] && a === currentQs[i].a)).length;
        document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
    }

    window.showReview = (idx, isStudy) => {
        const list = isStudy ? DB[currentCat][idx] : currentQs;
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        if(isStudy) currentExamIdx = idx;

        document.getElementById('resScore').innerText = isStudy ? `EXAM #${idx} GUIDE` : `RESULT: ${score}/${list.length}`;
        list.forEach((qData, i) => {
            const userAnswer = answers[i];
            const isCorrect = userAnswer === qData.a;
            scroll.innerHTML += `
                <div style="padding:15px; background:var(--bg); border-radius:12px; margin-bottom:10px;">
                    <b style="font-size:13px;">${i+1}. ${qData.q}</b><br>
                    <small style="color:var(--success); font-weight:700;">✔ ${qData.choices[qData.a]}</small>
                    ${!isCorrect ? `<br><small style="color:var(--danger); font-weight:700;">✖ ${userAnswer === -1 ? 'No Answer' : qData.choices[userAnswer]}</small>` : ''}
                </div>`;
        });
        window.setScreen('results');
    };

    window.retakeCurrentExam = () => currentExamIdx && window.startQuiz(currentExamIdx);
    window.backToExamList = () => currentCat ? window.openExams(currentCat) : window.setScreen('home');
</script>
</body>
</html>
