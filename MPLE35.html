<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Plumber Pro | ACE THE BOARD</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb; --accent: #f59e0b; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-sub: #64748b;
            --border: #e2e8f0; --radius-md: 16px; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #020617; --surface: #0f172a; --text-main: #f1f5f9; --text-sub: #94a3b8; --border: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- LAYOUT ARCHITECTURE --- */
        .app-container { display: flex; width: 100%; height: 100vh; }

        /* LEFT SIDEBAR */
        .sidebar { 
            width: 80px; background: var(--surface); border-right: 1px solid var(--border);
            display: none; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100;
        }
        .nav-item { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; color: var(--text-sub); margin-bottom: 20px; cursor: pointer; font-size: 24px;
        }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        /* MAIN CONTENT AREA */
        .main-content { flex: 1; position: relative; overflow-y: auto; height: 100%; display: flex; flex-direction: column; }

        /* CENTERED LOGIN SCREEN */
        #authScreen { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            width: 100%; height: 100%; padding: 20px; text-align: center;
        }

        .auth-card { width: 100%; max-width: 400px; background: var(--surface); padding: 40px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }

        /* --- COMPONENTS --- */
        .screen { display: none; padding: 40px; max-width: 800px; margin: 0 auto; width: 100%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-sub); }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); ring: 2px var(--primary); }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-ghost { background: transparent; color: var(--text-sub); margin-top: 5px; }

        /* CATEGORY CARDS */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .cat-card { background: var(--surface); padding: 20px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .cat-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow); }

        /* OVERLAY MODAL */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: var(--surface); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="setScreen('home')" title="Home"><ion-icon name="grid"></ion-icon></div>
        <div class="nav-item" onclick="alert('Leaderboard coming soon!')" title="Rankings"><ion-icon name="trophy"></ion-icon></div>
        <div class="nav-item" onclick="toggleTheme()" title="Theme"><ion-icon name="moon"></ion-icon></div>
        <div style="margin-top: auto;">
            <div class="nav-item" onclick="logout()" title="Logout" style="color: var(--danger);"><ion-icon name="log-out"></ion-icon></div>
        </div>
    </nav>

    <main class="main-content">
        <div id="authScreen">
            <div class="auth-card">
                <div style="font-size: 50px; color: var(--primary); margin-bottom: 10px;"><ion-icon name="ribbon"></ion-icon></div>
                <h1 style="margin: 0; font-size: 24px;">Master Plumber Pro</h1>
                <p style="color: var(--text-sub); margin-bottom: 30px;">Login or create an account to start</p>
                
                <div class="input-group">
                    <label>USERNAME</label>
                    <input type="text" id="username" placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                
                <button class="btn btn-primary" onclick="handleAuth()">LOGIN / REGISTER</button>
                <button class="btn btn-ghost" onclick="enterAsGuest()">Continue as Guest</button>
            </div>
        </div>

        <div id="home" class="screen">
            <h2 style="margin:0;">Dashboard</h2>
            <p id="welcomeMsg" style="color: var(--text-sub); margin-top: 5px;">Welcome back!</p>
            
            <div id="proBanner" style="background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; padding: 25px; border-radius: 20px; margin: 20px 0; display: none;">
                <h3 style="margin:0;">Go Pro for ₱299</h3>
                <p style="margin: 5px 0 15px 0; opacity: 0.9;">Unlock all 60 exams and get a personalized certificate.</p>
                <button class="btn" style="background: white; color: #ef4444; width: auto; display: inline-flex;" onclick="showPayment('LIFETIME PRO', '₱299')">Upgrade Now</button>
            </div>

            <div class="category-grid" id="catGrid">
                </div>
        </div>

        <div id="exams" class="screen">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom: 30px;">
                <button onclick="setScreen('home')" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-main);"><ion-icon name="arrow-back"></ion-icon></button>
                <h2 id="catTitle" style="margin:0;">Category Name</h2>
            </div>
            <div id="examList"></div>
        </div>
    </main>
</div>

<div id="paymentModal" class="overlay">
    <div class="modal">
        <h2 id="payTitle">Unlock</h2>
        <div style="padding: 20px; background: #f1f5f9; border-radius: 16px; margin-bottom: 20px;">
            <p style="font-size: 12px; color: var(--text-sub);">Scan to pay via GCash</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GCASH_PAYMENT" style="width: 150px;">
            <div id="payPrice" style="font-weight: 800; font-size: 20px; color: var(--primary); margin-top: 10px;">₱0.00</div>
        </div>
        <input type="text" id="licenseKey" placeholder="Enter Activation Key" style="text-align: center; margin-bottom: 15px;">
        <button class="btn btn-primary" onclick="verifyKey()">Activate</button>
        <button class="btn btn-ghost" onclick="document.getElementById('paymentModal').style.display='none'">Cancel</button>
    </div>
</div>

<script type="module">
    // Mock Database for UI generation
    const categories = ["Plumbing Code", "Plumbing Arithmetic", "Sanitation & Design", "Practical Problems"];
    
    let currentUser = null, isPaid = false, currentCat = "";

    // --- ENHANCED AUTH LOGIC ---
    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Please fill in both fields.");

        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u);

        if(!user) {
            // AUTO-REGISTER if user doesn't exist
            user = { u, p, paid: false, unlocked: [] };
            users.push(user);
            localStorage.setItem('mp_users', JSON.stringify(users));
            alert("Account created successfully!");
        } else if(user.p !== p) {
            return alert("Incorrect password.");
        }

        login(user);
    };

    window.enterAsGuest = () => login({ u: "Guest", paid: false, unlocked: [] });

    function login(user) {
        currentUser = user.u;
        isPaid = user.paid;
        
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('welcomeMsg').innerText = `Welcome back, ${currentUser}!`;
        document.getElementById('proBanner').style.display = isPaid ? 'none' : 'block';
        
        renderCategories();
        setScreen('home');
    }

    // --- NAVIGATION ---
    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        
        // Update Sidebar Active State
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.classList.remove('active');
            if(nav.getAttribute('onclick').includes(id)) nav.classList.add('active');
        });
    };

    function renderCategories() {
        const grid = document.getElementById('catGrid');
        grid.innerHTML = categories.map(cat => `
            <div class="cat-card" onclick="openExams('${cat}')">
                <div style="width:50px; height:50px; background:rgba(37,99,235,0.1); border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:24px;">
                    <ion-icon name="folder-open"></ion-icon>
                </div>
                <div>
                    <div style="font-weight:700;">${cat}</div>
                    <div style="font-size:12px; color:var(--text-sub);">15 Practice Exams</div>
                </div>
            </div>
        `).join('');
    }

    window.openExams = (cat) => {
        currentCat = cat;
        document.getElementById('catTitle').innerText = cat;
        const list = document.getElementById('examList');
        list.innerHTML = "";
        
        for(let i=1; i<=15; i++) {
            const locked = !isPaid && i > 1;
            list.innerHTML += `
                <div style="padding:20px; background:var(--surface); border:1px solid var(--border); border-radius:16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:700;">Exam #${i} ${locked ? '🔒' : ''}</div>
                    <button class="btn btn-primary" style="width:auto; padding:8px 20px;" onclick="handleExamClick(${i}, ${locked})">
                        ${locked ? 'Unlock' : 'Start'}
                    </button>
                </div>
            `;
        }
        setScreen('exams');
    };

    window.handleExamClick = (idx, locked) => {
        if(locked) showPayment(`EXAM #${idx}`, "₱9");
        else alert(`Starting Exam ${idx}... (Quiz logic would trigger here)`);
    };

    window.showPayment = (type, price) => {
        document.getElementById('payTitle').innerText = type;
        document.getElementById('payPrice').innerText = price;
        document.getElementById('paymentModal').style.display = 'flex';
    };

    window.verifyKey = () => {
        const key = document.getElementById('licenseKey').value;
        if(key === "PRO2026") {
            isPaid = true;
            let users = JSON.parse(localStorage.getItem('mp_users'));
            let u = users.find(x => x.u === currentUser);
            if(u) u.paid = true;
            localStorage.setItem('mp_users', JSON.stringify(users));
            alert("Activation Successful!");
            location.reload();
        } else {
            alert("Invalid Key.");
        }
    };

    window.toggleTheme = () => {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };

    window.logout = () => location.reload();

</script>
</body>
</html>
