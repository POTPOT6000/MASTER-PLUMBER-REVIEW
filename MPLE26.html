<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --sub: #94a3b8; --border: #334155; --glow: rgba(59, 130, 246, 0.5);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --glow: rgba(59, 130, 246, 0.2);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            position: relative; display: flex; flex-direction: column;
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; min-height: 45px; }

        button { 
            width: 100%; padding: 16px; margin: 10px 0; border: 1px solid var(--border); border-radius: 18px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--card); 
            color: var(--text); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        button:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }

        .btn-main { background: var(--accent); color: #fff; border: none; }
        .btn-main:hover { background: #2563eb; }

        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .cat-card { 
            padding: 20px; border-radius: 20px; text-align: center; font-size: 12px; 
            background: var(--card); border: 1px solid var(--border); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .cat-card ion-icon { font-size: 32px; color: var(--accent); }
        .cat-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .screen { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: var(--border); display:none; }
        #progressBar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: 0.4s ease; }
        
        .exam-row { display: flex; gap: 10px; margin: 10px 0; background: rgba(0,0,0,0.03); border-radius: 18px; padding: 5px; }
        .full-press-btn { flex: 1; text-align: left; justify-content: space-between; padding: 15px 20px; margin: 0; background: transparent; border: none; }
        .btn-eye { width: 60px; background: var(--warning); color: white !important; margin: 0; border-radius: 16px; font-size: 20px; border: none; }
        .locked { opacity: 0.6; filter: grayscale(0.5); }

        /* CIRCLE PROGRESS */
        .progress-circle { width: 32px; height: 32px; position: relative; display: flex; align-items: center; justify-content: center; margin-left: 10px; }
        .progress-circle svg { width: 32px; height: 32px; transform: rotate(-90deg); }
        .progress-circle circle { fill: none; stroke-width: 3; stroke-linecap: round; }
        .circle-bg { stroke: var(--border); }
        .circle-bar { stroke: var(--success); stroke-dasharray: 100; stroke-dashoffset: 100; transition: 0.5s; }
        .progress-text { position: absolute; font-size: 8px; font-weight: 700; color: var(--text); }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        #scoreBox { backdrop-filter: blur(10px); background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); color: var(--accent); visibility: hidden; padding: 8px 16px; border-radius: 14px; font-size: 14px; font-weight: 700; }
    </style>
</head>
<body data-theme="dark">

<div class="app-card" id="appBody">
    <div id="pBarCont" class="progress-container"><div id="progressBar"></div></div>
    
    <div class="app-header">
        <div id="scoreBox">0/0</div>
        <button onclick="toggleTheme()" style="width: 45px; height: 45px; border-radius: 14px; padding: 0; margin: 0;"><ion-icon id="themeIcon" name="sunny-outline"></ion-icon></button>
    </div>

    <div id="authScreen" class="screen" style="display: block; text-align: center;">
        <div style="margin-top: 20px; margin-bottom: 20px;">
            <div style="font-size: 60px; color: var(--accent);"><ion-icon name="construct-outline"></ion-icon></div>
            <h1 style="font-size: 24px; margin: 0; letter-spacing: -0.5px;">MASTER PLUMBER</h1>
            <p style="color: var(--sub); font-size: 14px;">Board Exam Reviewer</p>
        </div>
        <button class="btn-main" onclick="enterAsGuest()">ENTER AS GUEST</button>
        <div style="margin: 25px 0 10px; font-size: 11px; color: var(--sub); text-transform: uppercase;">MEMBER LOGIN / SIGNUP</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Login / Register</button>
    </div>

    <div id="paymentScreen" class="screen" style="text-align: center;">
        <h3 id="payTitle" style="font-size: 20px;">Unlock Pro Access</h3>
        <p id="payPrice" style="color: var(--accent); font-weight: 700; font-size: 18px; margin-top: -10px;"></p>
        <div style="width: 160px; height: 160px; background: white; margin: 10px auto; border: 4px solid var(--accent); border-radius: 24px; padding: 10px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GCASH_09123456789" style="width:100%">
        </div>
        <p style="font-size: 14px; color: var(--sub);">Send payment to GCash: <b>09XX XXX XXXX</b></p>
        <input type="text" id="licenseKey" placeholder="Enter Reference Code / License Key">
        <button class="btn-main" onclick="verifyKey()">Activate Now</button>
        <button onclick="setScreen('home')" style="background:transparent; border:none; color:var(--sub); font-size:12px;">Cancel</button>
    </div>

    <div id="home" class="screen">
        <div style="margin-bottom: 25px;">
            <h2 style="margin:0; font-size: 22px;">Categories</h2>
            <p id="userStatus" style="font-size: 12px; font-weight: 700; margin-top: 5px;"></p>
        </div>
        
        <div class="category-grid">
            <div class="cat-card" onclick="openExams('Plumbing Code')">
                <ion-icon name="book-outline"></ion-icon>
                <span>Plumbing Code</span>
            </div>
            <div class="cat-card" onclick="openExams('Plumbing Arithmetic')">
                <ion-icon name="calculator-outline"></ion-icon>
                <span>Plumbing Arithmetic</span>
            </div>
            <div class="cat-card" onclick="openExams('Sanitation, Plumbing Design, and Installation')">
                <ion-icon name="brush-outline"></ion-icon>
                <span>Sanitation & Design</span>
            </div>
            <div class="cat-card" onclick="openExams('Practical Problems & Experiences')">
                <ion-icon name="hammer-outline"></ion-icon>
                <span>Practical Problems</span>
            </div>
        </div>
        
        <button id="upgradeBtn" onclick="handleUpgradeClick()" style="background: linear-gradient(45deg, #f97316, #f59e0b); color:white; margin-top: 30px; border:none;">UPGRADE TO PRO (₱299)</button>
        <button onclick="logout()" style="margin-top: 15px; border: none; color: var(--danger); font-size: 11px; background:transparent;">Logout / Exit</button>
    </div>

    <div id="exams" class="screen">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
            <button onclick="setScreen('home')" style="width:40px; height:40px; margin:0; border-radius:12px;"><ion-icon name="arrow-back"></ion-icon></button>
            <h2 id="catTitle" style="font-size: 16px; margin:0; color: var(--accent);"></h2>
        </div>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>
        
        <button onclick="setScreen('home')" style="margin-top: 20px; background: var(--card); border: 1px solid var(--border);">
            <ion-icon name="chevron-back-outline"></ion-icon> BACK TO CATEGORIES
        </button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 8px;"></div>
        <div id="qTxt" style="font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 25px; min-height: 80px;"></div>
        <div id="choices"></div>
        <div style="display:flex; gap:10px; margin-top: 20px;">
            <button onclick="prevQ()" style="flex:1">Back</button>
            <button onclick="handleNextLogic()" style="flex:2" class="btn-main">Next</button>
        </div>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center; color: var(--accent); font-size: 28px;"></h2>
        <div id="revScroll" style="max-height: 380px; overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 15px;"></div>
        <button class="btn-main" onclick="setScreen('home')" style="margin-top:20px;">Back Home</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB, 
        "Plumbing Code": codeDB,
        "Sanitation, Plumbing Design, and Installation": designDB, 
        "Practical Problems & Experiences": practicalDB
    };

    let currentUser = null, isPaid = false, currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0;
    let unlockedExams = []; // Track 9 pesos individual unlocks
    const MASTER_KEY = "MP-MASTER-2024";

    window.toggleTheme = () => {
        const b = document.body;
        const isL = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isL ? 'dark' : 'light');
        document.getElementById('themeIcon').setAttribute('name', isL ? 'sunny-outline' : 'moon-outline');
    };

    window.enterAsGuest = () => { currentUser = "Guest"; isPaid = false; updateHomeUI(); setScreen('home'); };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Fill all fields");
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u);
        if(!user) { user = { u, p, paid: false, unlocked: [] }; users.push(user); localStorage.setItem('mp_users', JSON.stringify(users)); }
        else if(user.p !== p) return alert("Wrong password");
        currentUser = user.u; isPaid = user.paid; unlockedExams = user.unlocked || []; updateHomeUI(); setScreen('home');
    };

    function updateHomeUI() {
        const s = document.getElementById('userStatus');
        s.innerText = currentUser === "Guest" ? "GUEST MODE" : (isPaid ? `PRO ACCOUNT: ${currentUser}` : "MEMBER MODE");
        s.style.color = isPaid ? "var(--success)" : "var(--warning)";
        document.getElementById('upgradeBtn').style.display = isPaid ? "none" : "block";
    }

    window.handleUpgradeClick = () => {
        if(currentUser === "Guest") {
            alert("Please Login or Signup first to upgrade to Pro.");
            setScreen('authScreen');
        } else {
            showPayment("PRO ACCESS", "₱299");
        }
    };

    function showPayment(type, price) {
        document.getElementById('payTitle').innerText = `Unlock ${type}`;
        document.getElementById('payPrice').innerText = price;
        setScreen('paymentScreen');
    }

    window.verifyKey = () => {
        const key = document.getElementById('licenseKey').value;
        if(key === MASTER_KEY) {
            isPaid = true;
            saveUserPurchase(true);
            alert("Pro Unlocked!"); updateHomeUI(); setScreen('home');
        } else if (key === "UNLOCK-9") {
            unlockedExams.push(`${currentCat}-${currentExamIdx}`);
            saveUserPurchase(false);
            alert("Exam Unlocked!"); openExams(currentCat);
        } else alert("Invalid Code");
    };

    function saveUserPurchase(isPro) {
        if(currentUser === "Guest") return;
        let users = JSON.parse(localStorage.getItem('mp_users'));
        let u = users.find(x => x.u === currentUser);
        if(isPro) u.paid = true;
        u.unlocked = unlockedExams;
        localStorage.setItem('mp_users', JSON.stringify(users));
    }

    window.logout = () => location.reload();

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.visibility = (id === 'quiz') ? 'visible' : 'hidden';
        document.getElementById('pBarCont').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat.toUpperCase();
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const isIndividuallyUnlocked = unlockedExams.includes(`${cat}-${i}`);
            const isLocked = (!isPaid && i > 1 && !isIndividuallyUnlocked);
            
            // Progress Calculation
            const savedScore = localStorage.getItem(`progress-${currentUser}-${cat}-${i}`) || 0;
            const dash = 100 - savedScore;

            grid.innerHTML += `
                <div class="exam-row ${isLocked ? 'locked' : ''}">
                    <div class="progress-circle">
                        <svg><circle class="circle-bg" cx="16" cy="16" r="14"></circle><circle class="circle-bar" cx="16" cy="16" r="14" style="stroke-dashoffset:${dash}"></circle></svg>
                        <span class="progress-text">${savedScore}%</span>
                    </div>
                    <button class="full-press-btn" onclick="handleExamClick(${i}, ${isLocked})">
                        <span>EXAM #${i} ${isLocked ? '🔒' : ''}</span>
                        <ion-icon name="chevron-forward-outline"></ion-icon>
                    </button>
                    <button class="btn-eye" onclick="handleReviewClick(${i}, ${isLocked})"><ion-icon name="eye-outline"></ion-icon></button>
                </div>`;
        }
        setScreen('exams');
    };

    window.handleExamClick = (idx, isLocked) => {
        if(isLocked) {
            const choice = confirm(`Exam #${idx} is locked.\n\nPress OK to unlock this exam for ₱9.\nPress CANCEL to upgrade to PRO for ₱299 (Unlock All).`);
            currentExamIdx = idx;
            if(currentUser === "Guest") {
                alert("Please login first to purchase exams.");
                return setScreen('authScreen');
            }
            if(choice) showPayment(`EXAM #${idx}`, "₱9");
            else handleUpgradeClick();
        } else startQuiz(idx);
    };

    window.handleReviewClick = (idx, isLocked) => {
        if(!isPaid) {
            alert("View All Exams Summary is exclusive to PRO members only.");
            handleUpgradeClick();
        } else {
            if(confirm(`Do you want to view Exam #${idx} and its answers?`)) {
                showReview(idx);
            }
        }
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx; currentQs = [...DB[currentCat][idx]];
        curIdx = 0; answers = new Array(currentQs.length).fill(null); score = 0;
        document.getElementById('scoreBox').innerText = `0 / ${currentQs.length}`;
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const q = currentQs[curIdx];
        document.getElementById('progressBar').style.width = ((curIdx) / currentQs.length * 100) + "%";
        document.getElementById('qNum').innerText = `QUESTION ${curIdx+1} OF ${currentQs.length}`;
        document.getElementById('qTxt').innerText = q.q;
        const box = document.getElementById('choices'); box.innerHTML = "";
        q.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === q.a) b.classList.add('correct');
                else if(i === answers[curIdx]) b.classList.add('wrong');
                b.disabled = true;
            } else {
                b.onclick = () => {
                    answers[curIdx] = i;
                    score = answers.filter((a, idx) => a === currentQs[idx].a).length;
                    document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
                    loadQ();
                };
            }
            box.appendChild(b);
        });
    };

    window.handleNextLogic = () => { if(curIdx < currentQs.length-1) { curIdx++; loadQ(); } else showResults(); };
    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };

    function showResults() {
        const perc = Math.round((score/currentQs.length)*100);
        localStorage.setItem(`progress-${currentUser}-${currentCat}-${currentExamIdx}`, perc);
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        document.getElementById('resScore').innerText = `SCORE: ${score} / ${currentQs.length}`;
        currentQs.forEach((q, i) => {
            let ch = ""; q.choices.forEach((c, ci) => {
                let cls = (ci === q.a) ? "color:var(--success); font-weight:700;" : (ci === answers[i] ? "color:var(--danger);" : "");
                ch += `<div style="font-size:12px; margin:4px 0; ${cls}">${c}</div>`;
            });
            scroll.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid var(--border);"><b>${i+1}. ${q.q}</b>${ch}</div>`;
        });
        setScreen('results');
    }

    function showReview(idx) {
        const qs = DB[currentCat][idx];
        document.getElementById('resScore').innerText = `EXAM #${idx} SUMMARY`;
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        qs.forEach((q, i) => {
            let ch = ""; q.choices.forEach((c, ci) => {
                let cls = (ci === q.a) ? "color:var(--success); font-weight:700;" : "";
                ch += `<div style="font-size:12px; margin:4px 0; ${cls}">${c}</div>`;
            });
            scroll.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid var(--border);"><b>${i+1}. ${q.q}</b>${ch}</div>`;
        });
        setScreen('results');
    }
</script>
</body>
</html>
