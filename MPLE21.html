<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
            --orange: #f97316;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: #1e293b; --btn-ghost: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.2s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 25px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; min-height: 45px; }

        button { 
            width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 16px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); 
            color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-main { background: var(--accent); color: #fff !important; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--btn-ghost); display:none; }
        #progressBar { height: 100%; background: var(--accent); width: 0%; transition: 0.4s ease; }
        
        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--danger) !important; color: white !important; }
        
        .exam-row { display: flex; gap: 8px; margin: 8px 0; }
        .full-press-btn { flex: 1; text-align: left; justify-content: space-between; padding: 15px 20px; margin: 0; }
        .btn-eye { width: 55px; background: var(--orange); color: white !important; margin: 0; border-radius: 16px; font-size: 20px; }
        .locked { opacity: 0.6; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        
        /* Pricing Modal */
        .unlock-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: none; align-items: center; 
            justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
        }
        .modal-content { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }
    </style>
</head>
<body data-theme="light">

<div id="unlockModal" class="unlock-modal">
    <div class="modal-content">
        <ion-icon name="cart-outline" style="font-size: 50px; color: var(--accent);"></ion-icon>
        <h3 id="modalTitle" style="margin-top: 10px;">Unlock Content</h3>
        <p style="font-size: 13px; color: var(--sub); margin-bottom: 20px;">Choose a plan to continue your reviewer:</p>
        
        <button class="btn-main" onclick="goToPayment('single')" style="margin-bottom: 5px;">
            Unlock this Exam Only • ₱9.00
        </button>
        <button style="background: var(--orange); color: white;" onclick="goToPayment('full')">
            Unlock ALL Features • ₱299.00
        </button>
        
        <button onclick="closeModal()" style="background: transparent; margin-top: 10px; font-size: 12px; color: var(--sub);">Close</button>
    </div>
</div>

<div class="app-card" id="appBody">
    <div id="pBarCont" class="progress-container"><div id="progressBar"></div></div>
    
    <div class="app-header">
        <div id="scoreBox" style="background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 700; visibility: hidden;">0/0</div>
        <button onclick="toggleTheme()" style="width: 40px; height: 40px; border-radius: 12px; padding: 0; margin: 0;"><ion-icon id="themeIcon" name="moon-outline"></ion-icon></button>
    </div>

    <div id="authScreen" class="screen" style="display: block; text-align: center;">
        <div style="font-size: 60px; color: var(--accent);"><ion-icon name="medal-outline"></ion-icon></div>
        <h1 style="font-size: 22px;">MASTER PLUMBER PRO</h1>
        <button class="btn-main" onclick="enterAsGuest()">ENTER AS GUEST</button>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Login / Register</button>
    </div>

    <div id="paymentScreen" class="screen" style="text-align: center;">
        <h3 id="payModeTitle">Payment</h3>
        <p id="payDetail" style="font-size: 16px; color: var(--accent); font-weight: 700; margin: 5px 0;"></p>
        <div style="width: 160px; height: 160px; background: white; margin: 15px auto; border: 4px solid #007dfe; border-radius: 15px; padding: 10px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GCASH_09123456789" style="width:100%">
        </div>
        <p style="font-size: 11px; line-height: 1.4;">Send GCash to <b>09XX XXX XXXX</b><br>Reference No. will serve as your Key</p>
        <input type="text" id="licenseKey" placeholder="Enter Reference Code">
        <button class="btn-main" onclick="verifyKey()">Unlock Now</button>
        <button onclick="setScreen('home')" style="background:transparent; font-size:12px;">Go Back</button>
    </div>

    <div id="home" class="screen">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="margin:0; font-size: 18px;">BOARD CATEGORIES</h2>
            <p id="userStatus" style="font-size: 11px; font-weight: 700; margin-top: 5px;"></p>
        </div>
        <button class="btn-main" onclick="openExams('Plumbing Code')">Plumbing Code</button>
        <button class="btn-main" onclick="openExams('Plumbing Arithmetic')">Plumbing Arithmetic</button>
        <button class="btn-main" onclick="openExams('Sanitation Plumbing Design and Installation')">Sanitation & Design</button>
        <button class="btn-main" onclick="openExams('Practical Problems and Experiences')">Practical Problems</button>
        <button onclick="logout()" style="margin-top: 25px; border: 1px solid var(--border); color: var(--danger); font-size: 11px;">Logout</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; text-align: center; color: var(--accent);"></h2>
        <div id="examGrid" style="max-height: 420px; overflow-y: auto; padding-right: 5px;"></div>
        <button onclick="setScreen('home')">Back</button>
    </div>

    <div id="quiz" class="screen">
        <div id="qNum" style="font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 5px;"></div>
        <div id="qTxt" style="font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 25px; min-height: 80px;"></div>
        <div id="choices"></div>
        <div style="display:flex; gap:10px; margin-top: 20px;">
            <button onclick="prevQ()" style="flex:1">Back</button>
            <button onclick="handleNextLogic()" style="flex:2" class="btn-main">Next</button>
        </div>
        <div style="display:flex; gap:10px; margin-top: 8px;">
            <button onclick="quitQuiz()" style="font-size:11px; flex:1; color:var(--danger)">Quit</button>
            <button onclick="finishExamEarly()" style="font-size:11px; flex:1; color:var(--success)">Finish</button>
        </div>
        <button onclick="alert('Report submitted.')" style="font-size:10px; background:transparent; color:var(--sub); margin-top: 5px;">Report Problem</button>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center; color: var(--accent);"></h2>
        <div id="revScroll" style="max-height: 380px; overflow-y: auto; background: var(--btn-ghost); border-radius: 20px; padding: 15px;"></div>
        <button class="btn-main" onclick="setScreen('home')">Dashboard</button>
    </div>
</div>

<script type="module">
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = { "Plumbing Arithmetic": arithmeticDB, "Plumbing Code": codeDB, "Sanitation Plumbing Design and Installation": designDB, "Practical Problems and Experiences": practicalDB };
    let currentUser = null, isPaid = false, unlockedExams = [], currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0, pendingUnlock = null;
    const MASTER_PRO_KEY = "MP-299-FULL";
    const MASTER_SINGLE_KEY = "MP-9-EXAM";

    window.toggleTheme = () => {
        const b = document.body;
        const isL = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isL ? 'dark' : 'light');
        document.getElementById('themeIcon').setAttribute('name', isL ? 'sunny-outline' : 'moon-outline');
    };

    window.enterAsGuest = () => { currentUser = "Guest"; isPaid = false; unlockedExams = []; updateHomeUI(); setScreen('home'); };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Please login");
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u);
        if(!user) { user = { u, p, paid: false, unlocked: [] }; users.push(user); localStorage.setItem('mp_users', JSON.stringify(users)); }
        else if(user.p !== p) return alert("Wrong password");
        currentUser = user.u; isPaid = user.paid; unlockedExams = user.unlocked || [];
        updateHomeUI(); setScreen('home');
    };

    function updateHomeUI() {
        const s = document.getElementById('userStatus');
        s.innerText = isPaid ? `PRO ACCOUNT: ${currentUser}` : (currentUser === "Guest" ? "GUEST MODE" : `USER: ${currentUser}`);
        s.style.color = isPaid ? "var(--success)" : "var(--warning)";
    }

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat.toUpperCase();
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const isIndividualUnlocked = unlockedExams.includes(`${cat}_${i}`);
            const isLocked = (!isPaid && i > 1 && !isIndividualUnlocked);
            grid.innerHTML += `
                <div class="exam-row ${isLocked ? 'locked' : ''}">
                    <button class="full-press-btn" onclick="triggerUnlockCheck(${i}, ${isLocked})">
                        <span>EXAM #${i} ${isLocked ? '🔒' : ''}</span>
                        <ion-icon name="chevron-forward-outline"></ion-icon>
                    </button>
                    <button class="btn-eye" onclick="${isLocked ? `triggerUnlockCheck(${i}, true)` : `showReview(${i}, true)`}"><ion-icon name="eye-outline"></ion-icon></button>
                </div>`;
        }
        setScreen('exams');
    };

    window.triggerUnlockCheck = (idx, locked) => {
        if(!locked) return startQuiz(idx);
        pendingUnlock = idx;
        document.getElementById('modalTitle').innerText = `Exam #${idx} is Locked`;
        document.getElementById('unlockModal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('unlockModal').style.display = 'none';

    window.goToPayment = (type) => {
        closeModal();
        const detail = type === 'single' ? `Unlock Exam #${pendingUnlock} (₱9.00)` : `All Categories (₱299.00)`;
        document.getElementById('payModeTitle').innerText = type === 'single' ? "Single Exam" : "Pro Activation";
        document.getElementById('payDetail').innerText = detail;
        setScreen('paymentScreen');
    };

    window.verifyKey = () => {
        const key = document.getElementById('licenseKey').value;
        const mode = document.getElementById('payModeTitle').innerText;
        
        if(key === MASTER_PRO_KEY || (mode.includes("Single") && key === MASTER_SINGLE_KEY)) {
            if(mode.includes("Single")) {
                const id = `${currentCat}_${pendingUnlock}`;
                if(!unlockedExams.includes(id)) unlockedExams.push(id);
                alert(`Exam #${pendingUnlock} successfully unlocked!`);
            } else {
                isPaid = true;
                alert("Welcome to PRO! All exams unlocked.");
            }
            if(currentUser !== "Guest") {
                let uArr = JSON.parse(localStorage.getItem('mp_users'));
                let user = uArr.find(x => x.u === currentUser);
                user.paid = isPaid; user.unlocked = unlockedExams;
                localStorage.setItem('mp_users', JSON.stringify(uArr));
            }
            updateHomeUI(); openExams(currentCat);
        } else alert("Reference key not recognized.");
    };

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('scoreBox').style.visibility = (id === 'quiz') ? 'visible' : 'hidden';
        document.getElementById('pBarCont').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx; currentQs = [...DB[currentCat][idx]];
        curIdx = 0; answers = new Array(currentQs.length).fill(null); score = 0;
        document.getElementById('scoreBox').innerText = `0 / ${currentQs.length}`;
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const q = currentQs[curIdx];
        document.getElementById('progressBar').style.width = ((curIdx) / currentQs.length * 100) + "%";
        document.getElementById('qNum').innerText = `Q${curIdx+1} OF ${currentQs.length}`;
        document.getElementById('qTxt').innerText = q.q;
        const box = document.getElementById('choices'); box.innerHTML = "";
        q.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === q.a) b.classList.add('correct');
                else if(i === answers[curIdx]) b.classList.add('wrong');
                b.disabled = true;
            } else {
                b.onclick = () => {
                    answers[curIdx] = i;
                    score = answers.filter((a, idx) => a === currentQs[idx].a).length;
                    document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
                    loadQ();
                };
            }
            box.appendChild(b);
        });
    };

    window.handleNextLogic = () => { if(curIdx < currentQs.length-1) { curIdx++; loadQ(); } else finishExamEarly(); };
    window.finishExamEarly = () => { if(confirm("Submit Answers?")) showResults(); };
    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };
    window.quitQuiz = () => { if(confirm("Quit current exam?")) setScreen('home'); };
    window.logout = () => location.reload();

    function showResults() {
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        document.getElementById('resScore').innerText = `RESULT: ${score} / ${currentQs.length}`;
        currentQs.forEach((q, i) => {
            let ch = ""; q.choices.forEach((c, ci) => {
                let cls = (ci === q.a) ? "correct" : (ci === answers[i] ? "wrong" : "");
                ch += `<div style="font-size:12px; padding:8px; margin:4px 0; border-radius:10px; background:var(--bg); ${cls==='correct'?'background:var(--success); color:white;':''} ${cls==='wrong'?'background:var(--danger); color:white;':''}">${c}</div>`;
            });
            scroll.innerHTML += `<div style="padding:15px 0; border-bottom:1px solid var(--border);"><b>${i+1}. ${q.q}</b>${ch}</div>`;
        });
        setScreen('results');
    }

    window.showReview = (idx, isStudy) => {
        const qs = DB[currentCat][idx];
        document.getElementById('resScore').innerText = `EXAM #${idx} KEY`;
        const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
        qs.forEach((q, i) => {
            let ch = ""; q.choices.forEach((c, ci) => {
                let cls = (ci === q.a) ? "correct" : "";
                ch += `<div style="font-size:12px; padding:8px; margin:4px 0; border-radius:10px; background:var(--bg); ${cls==='correct'?'background:var(--success); color:white;':''}">${c}</div>`;
            });
            scroll.innerHTML += `<div style="padding:15px 0; border-bottom:1.5px solid var(--border);"><b>${i+1}. ${q.q}</b>${ch}</div>`;
        });
        setScreen('results');
    };
</script>
</body>
</html>
