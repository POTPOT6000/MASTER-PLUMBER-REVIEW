<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sub: #64748b; --border: #e2e8f0; --btn-ghost: #f1f5f9;
            --orange: #f97316; --light-blue: #bae6fd; --dark-blue: #1d4ed8;
            --pro-gradient: linear-gradient(135deg, #FF6B00 0%, #FF2E00 100%);
            --pro-text: #FFEBCC;
            --status-free: #64748b;
            --cat-icon-code: #E0F2FE; --cat-icon-arith: #FEE2E2; --cat-icon-design: #DCFCE7; --cat-icon-prac: #FFEDD5;
        }
        [data-theme="dark"] {
            --primary: #38bdf8; --accent: #0ea5e9; --success: #34d399; --danger: #f87171;
            --warning: #fbbf24; --bg: #020617; --card: #0f172a; --text: #f1f5f9;
            --sub: #94a3b8; --border: #1e293b; --btn-ghost: #1e293b;
            --pro-gradient: linear-gradient(135deg, #cc5500 0%, #cc2400 100%);
            --pro-text: #fef0db;
            --status-free: #94a3b8;
            --cat-icon-code: #0c4a6e; --cat-icon-arith: #7f1d1d; --cat-icon-design: #14532d; --cat-icon-prac: #7c2d12;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.2s ease; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; padding-bottom: 80px; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 25px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden;
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; min-height: 45px; }

        button { 
            width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 16px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--btn-ghost); 
            color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-main { background: var(--accent); color: #fff !important; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
