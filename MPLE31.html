<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PLUMBER REVIEWER PRO</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --sub: #94a3b8; --border: #334155; --glow: rgba(59, 130, 246, 0.5);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --glow: rgba(59, 130, 246, 0.2);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }

        .app-card { 
            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            position: relative; display: flex; flex-direction: column;
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; min-height: 45px; }

        button { 
            width: 100%; padding: 16px; margin: 10px 0; border: 1px solid var(--border); border-radius: 18px; 
            font-size: 14px; font-weight: 600; cursor: pointer; background: var(--card); 
            color: var(--text); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        button:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }
        .btn-main { background: var(--accent); color: #fff; border: none; }

        /* Centered Category Grid */
        .category-container { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; margin: 20px 0; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .cat-card { 
            padding: 15px; border-radius: 20px; text-align: center; font-size: 11px; font-weight: 600;
            background: var(--card); border: 1px solid var(--border); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            aspect-ratio: 1/1; line-height: 1.2;
        }
        .cat-card ion-icon { font-size: 32px; color: var(--accent); }

        .screen { display: none; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal Styles for Lock Popup */
        .modal-overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100; border-radius: 32px; 
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; text-align: center; border: 1px solid var(--border); width: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .btn-unlock-single { background: var(--success); color: white; border: none; }
        .btn-unlock-pro { background: linear-gradient(45deg, #f97316, #f59e0b); color: white; border: none; }
        .btn-cancel { background: transparent; color: var(--sub); border: 1px solid var(--border); }
        .savings-badge { background: #1e293b; color: var(--success); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 12px; margin-top: 5px; display: inline-block; border: 1px solid var(--success); }

        #userStatus { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); color: var(--success);
            font-size: 11px; letter-spacing: 1px;
        }

        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: var(--border); display:none; }
        #progressBar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: 0.4s ease; }
        
        .exam-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; background: rgba(0,0,0,0.03); border-radius: 18px; padding: 5px; }
        .full-press-btn { flex: 1; text-align: left; justify-content: space-between; padding: 15px 20px; margin: 0; background: transparent; border: none; }
        .btn-eye { width: 60px; height: 50px; background: var(--warning); color: white !important; margin: 0; border-radius: 16px; font-size: 20px; border: none; flex-shrink: 0; }
        .locked { opacity: 0.5; filter: grayscale(1); }

        .progress-circle { width: 36px; height: 36px; position: relative; display: flex; align-items: center; justify-content: center; margin-left: 8px; flex-shrink: 0; }
        .progress-circle svg { transform: rotate(-90deg); width: 36px; height: 36px; }
        .circle-bg { fill: none; stroke: var(--border); stroke-width: 3; }
        .circle-val { fill: none; stroke: var(--success); stroke-width: 3; stroke-dasharray: 100; stroke-dashoffset: 100; stroke-linecap: round; transition: 0.5s; }
        .percentage-text { position: absolute; font-size: 8px; font-weight: 800; color: var(--text); }

        /* QUIZ SPECIFIC */
        .choice-correct { background: var(--success) !important; color: white !important; border: none; }
        .choice-wrong { background: var(--danger) !important; color: white !important; border: none; }
        #feedbackTxt { text-align: center; font-weight: 700; font-size: 14px; margin-bottom: 10px; height: 20px; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        #scoreBox { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); color: var(--accent); visibility: hidden; padding: 8px 16px; border-radius: 14px; font-size: 14px; font-weight: 700; }
    </style>
</head>
<body data-theme="dark">

<div class="app-card" id="appBody">
    <div id="lockModal" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size: 40px; color: var(--warning); margin-bottom: 10px;"><ion-icon name="lock-closed-outline"></ion-icon></div>
            <h3 style="margin:0;">Exam Locked</h3>
            <p id="lockDesc" style="font-size: 12px; color: var(--sub); margin: 10px 0 20px 0;">This exam is part of the premium collection.</p>
            
            <button class="btn-unlock-single" id="btnSinglePay">UNLOCK THIS EXAM (₱9)</button>
            <button class="btn-unlock-pro" id="btnGoPro">UNLOCK ALL & GO PRO (₱299)</button>
            <div class="savings-badge">🔥 SAVE ₱241 (BEST VALUE)</div>
            
            <button class="btn-cancel" style="margin-top: 15px;" onclick="closeLockModal()">CANCEL</button>
        </div>
    </div>

    <div id="pBarCont" class="progress-container"><div id="progressBar"></div></div>
    
    <div class="app-header">
        <div id="scoreBox">0/0</div>
        <button onclick="toggleTheme()" style="width: 45px; height: 45px; border-radius: 14px; padding: 0; margin: 0;"><ion-icon id="themeIcon" name="sunny-outline"></ion-icon></button>
    </div>

    <div id="authScreen" class="screen" style="display: block; text-align: center;">
        <div style="margin-top: 20px; margin-bottom: 20px;">
            <div style="font-size: 60px; color: var(--accent);"><ion-icon name="construct-outline"></ion-icon></div>
            <h1 style="font-size: 24px; margin: 0;">MASTER PLUMBER</h1>
            <p style="color: var(--sub); font-size: 14px;">Reviewer Pro</p>
        </div>
        <button class="btn-main" onclick="enterAsGuest()">ENTER AS GUEST</button>
        <div style="margin: 10px; font-size: 12px; color: var(--sub);">— OR —</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Login / Register</button>
    </div>

    <div id="home" class="screen" style="height: 100%; display: flex; flex-direction: column;">
        <h2 style="margin:0;">Categories</h2>
        <div style="margin: 10px 0;"><span id="userStatus"></span></div>
        
        <div class="category-container">
            <div class="category-grid">
                <div class="cat-card" onclick="openExams('Plumbing Code')">
                    <ion-icon name="book-outline"></ion-icon>
                    <span>Plumbing Code</span>
                </div>
                <div class="cat-card" onclick="openExams('Plumbing Arithmetic')">
                    <ion-icon name="calculator-outline"></ion-icon>
                    <span>Plumbing Arithmetic</span>
                </div>
                <div class="cat-card" onclick="openExams('Sanitation, Plumbing Design, and Installation')">
                    <ion-icon name="brush-outline"></ion-icon>
                    <span>Sanitation, Plumbing Design, and Installation</span>
                </div>
                <div class="cat-card" onclick="openExams('Practical Problems & Experiences')">
                    <ion-icon name="hammer-outline"></ion-icon>
                    <span>Practical Problems & Experiences</span>
                </div>
            </div>
        </div>

        <button id="upgradeBtn" onclick="handleUpgradeFlow()" style="background: linear-gradient(45deg, #f97316, #f59e0b); color:white; border:none; margin-top: 20px;">UPGRADE TO PRO (₱299)</button>
        <button onclick="logout()" style="margin-top: 15px; border:none; background:transparent; color:var(--danger); font-size:11px;">Logout</button>
    </div>

    <div id="exams" class="screen">
        <h2 id="catTitle" style="font-size: 14px; color: var(--accent); text-transform: uppercase;"></h2>
        <div id="examGrid" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="setScreen('home')" style="margin-top: 20px; background: rgba(255,255,255,0.05);">
            <ion-icon name="chevron-back-outline"></ion-icon> BACK TO CATEGORIES
        </button>
    </div>

    <div id="quiz" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <div id="qNum" style="font-size: 11px; font-weight: 800; color: var(--accent);"></div>
            <button onclick="reportQuestion()" style="width:auto; padding: 5px 10px; margin:0; font-size: 10px; border-radius: 8px; color: var(--danger);"><ion-icon name="flag-outline"></ion-icon> Report</button>
        </div>
        <div id="qTxt" style="font-size: 17px; font-weight: 600; margin: 15px 0;"></div>
        <div id="feedbackTxt"></div> <div id="choices"></div>
        <div style="display:flex; gap:10px; margin-top: 15px;">
            <button onclick="prevQ()" style="flex:1">Back</button>
            <button onclick="handleNextLogic()" style="flex:2" class="btn-main">Next</button>
        </div>
    </div>

    <div id="paymentScreen" class="screen" style="text-align: center;">
        <h3 id="payTitle">Unlock</h3>
        <p id="payPrice" style="color: var(--accent); font-weight: 700;"></p>
        <div style="width: 150px; height: 150px; background: white; margin: 10px auto; border-radius: 20px; padding: 10px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=GCASH_PAYMENT" style="width:100%">
        </div>
        <input type="text" id="licenseKey" placeholder="Enter License Key">
        <button class="btn-main" onclick="verifyKey()">Activate</button>
        <button onclick="setScreen('home')" style="background:transparent; border:none; color:var(--sub);">Cancel</button>
    </div>

    <div id="results" class="screen">
        <h2 id="resScore" style="text-align: center; color: var(--accent);"></h2>
        <div id="revScroll" style="max-height: 380px; overflow-y: auto; padding: 15px; border: 1px solid var(--border); border-radius: 20px;"></div>
        <button class="btn-main" onclick="setScreen('home')" style="margin-top:20px;">Back Home</button>
    </div>
</div>

<script type="module">
    // NOTE: Keep your imports from arithmetic.js, code.js, etc. here as in the original file
    import { arithmeticDB } from './arithmetic.js';
    import { codeDB } from './code.js';
    import { designDB } from './design.js';
    import { practicalDB } from './practical.js';

    const DB = {
        "Plumbing Arithmetic": arithmeticDB, 
        "Plumbing Code": codeDB,
        "Sanitation, Plumbing Design, and Installation": designDB, 
        "Practical Problems & Experiences": practicalDB
    };

    let currentUser = null, isPaid = false, currentCat, currentExamIdx, currentQs, curIdx = 0, answers = [], score = 0;
    let unlockedExams = [];

    window.toggleTheme = () => {
        const b = document.body;
        const isL = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isL ? 'dark' : 'light');
    };

    window.enterAsGuest = () => { currentUser = "Guest"; isPaid = false; updateHomeUI(); setScreen('home'); };

    window.handleAuth = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Fill fields");
        let users = JSON.parse(localStorage.getItem('mp_users') || '[]');
        let user = users.find(x => x.u === u);
        if(!user) { user = { u, p, paid: false, unlocked: [] }; users.push(user); localStorage.setItem('mp_users', JSON.stringify(users)); }
        else if(user.p !== p) return alert("Wrong password");
        currentUser = user.u; isPaid = user.paid; unlockedExams = user.unlocked || [];
        updateHomeUI(); setScreen('home');
    };

    function updateHomeUI() {
        const s = document.getElementById('userStatus');
        if(currentUser === "Guest") {
            s.innerHTML = `<ion-icon name="flashlight-outline"></ion-icon> GUEST MODE ACTIVE`;
            s.style.boxShadow = "0 0 15px var(--success)";
        } else {
            s.innerText = isPaid ? `PRO: ${currentUser}` : `FREE: ${currentUser}`;
            s.style.boxShadow = isPaid ? "0 0 15px var(--warning)" : "none";
            s.style.borderColor = isPaid ? "var(--warning)" : "var(--success)";
            s.style.color = isPaid ? "var(--warning)" : "var(--success)";
        }
        document.getElementById('upgradeBtn').style.display = isPaid ? "none" : "block";
    }

    window.handleUpgradeFlow = () => {
        if(currentUser === "Guest") { alert("Please login first to upgrade."); setScreen('authScreen'); }
        else { showPayment("PRO ACCESS", "₱299"); }
    };

    window.closeLockModal = () => { document.getElementById('lockModal').style.display = 'none'; };

    window.handleExamClick = (idx, isLocked) => {
        currentExamIdx = idx;
        if(isLocked) {
            if(currentUser === "Guest") return setScreen('authScreen');
            const modal = document.getElementById('lockModal');
            document.getElementById('btnSinglePay').onclick = () => showPayment(`EXAM #${idx}`, "₱9");
            document.getElementById('btnGoPro').onclick = () => handleUpgradeFlow();
            modal.style.display = 'flex';
        } else {
            startQuiz(idx);
        }
    };

    function showPayment(type, price) {
        closeLockModal();
        document.getElementById('payTitle').innerText = type;
        document.getElementById('payPrice').innerText = price;
        setScreen('paymentScreen');
    }

    // Include the verifyKey, openExams, startQuiz, and loadQ logic from your original script below
    window.verifyKey = () => {
        const k = document.getElementById('licenseKey').value;
        if(k === "PRO123") { isPaid = true; saveP(true); alert("Pro Active!"); setScreen('home'); updateHomeUI(); }
        else if(k === "UNL9") { unlockedExams.push(`${currentCat}-${currentExamIdx}`); saveP(false); alert("Unlocked!"); openExams(currentCat); }
        else alert("Invalid");
    };

    function saveP(pro) {
        if(currentUser === "Guest") return;
        let users = JSON.parse(localStorage.getItem('mp_users'));
        let u = users.find(x => x.u === currentUser);
        if(pro) u.paid = true; u.unlocked = unlockedExams;
        localStorage.setItem('mp_users', JSON.stringify(users));
    }

    window.setScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = (id === 'home') ? 'flex' : 'block';
        document.getElementById('scoreBox').style.visibility = (id === 'quiz') ? 'visible' : 'hidden';
        document.getElementById('pBarCont').style.display = (id === 'quiz') ? 'block' : 'none';
    };

    window.openExams = (cat) => {
        currentCat = cat; document.getElementById('catTitle').innerText = cat;
        const grid = document.getElementById('examGrid'); grid.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const isUnl = unlockedExams.includes(`${cat}-${i}`);
            const isLocked = (!isPaid && i > 1 && !isUnl);
            const best = localStorage.getItem(`best_${currentUser}_${cat}_${i}`) || 0;
            grid.innerHTML += `
                <div class="exam-row ${isLocked ? 'locked' : ''}">
                    <div class="progress-circle">
                        <svg viewBox="0 0 36 36"><circle class="circle-bg" cx="18" cy="18" r="16"></circle><circle class="circle-val" cx="18" cy="18" r="16" style="stroke-dashoffset:${100-best}"></circle></svg>
                        <span class="percentage-text">${best}%</span>
                    </div>
                    <button class="full-press-btn" onclick="handleExamClick(${i}, ${isLocked})">EXAM #${i} ${isLocked ? '🔒' : ''}</button>
                    <button class="btn-eye" onclick="showReview(${i})"><ion-icon name="eye-outline"></ion-icon></button>
                </div>`;
        }
        setScreen('exams');
    };

    window.startQuiz = (idx) => {
        currentExamIdx = idx; currentQs = [...DB[currentCat][idx]];
        curIdx = 0; answers = new Array(currentQs.length).fill(null); score = 0;
        document.getElementById('scoreBox').innerText = `0 / ${currentQs.length}`;
        setScreen('quiz'); loadQ();
    };

    window.loadQ = () => {
        const q = currentQs[curIdx];
        const feedback = document.getElementById('feedbackTxt');
        document.getElementById('qNum').innerText = `QUESTION ${curIdx+1} / ${currentQs.length}`;
        document.getElementById('qTxt').innerText = q.q;
        document.getElementById('progressBar').style.width = ((curIdx + 1) / currentQs.length * 100) + "%";
        const box = document.getElementById('choices'); box.innerHTML = "";
        
        if(answers[curIdx] === null) {
            feedback.innerText = "Select an answer";
            feedback.style.color = "var(--sub)";
        } else {
            if(answers[curIdx] === q.a) { feedback.innerText = "RIGHT!"; feedback.style.color = "var(--success)"; }
            else if (answers[curIdx] === "skipped") { feedback.innerText = "SKIPPED"; feedback.style.color = "var(--warning)"; }
            else { feedback.innerText = "WRONG!"; feedback.style.color = "var(--danger)"; }
        }

        q.choices.forEach((c, i) => {
            const b = document.createElement('button');
            b.innerText = c;
            if(answers[curIdx] !== null) {
                if(i === q.a) b.classList.add('choice-correct');
                else if(i === answers[curIdx]) b.classList.add('choice-wrong');
                b.disabled = true;
            } else {
                b.onclick = () => {
                    answers[curIdx] = i;
                    if(i === q.a) { b.classList.add('choice-correct'); feedback.innerText = "RIGHT!"; feedback.style.color = "var(--success)"; }
                    else { b.classList.add('choice-wrong'); box.children[q.a].classList.add('choice-correct'); feedback.innerText = "WRONG!"; feedback.style.color = "var(--danger)"; }
                    Array.from(box.children).forEach(btn => btn.disabled = true);
                    score = answers.filter((a, idx) => a === currentQs[idx].a).length;
                    document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
                };
            }
            box.appendChild(b);
        });
    };

    window.handleNextLogic = () => { if(answers[curIdx] === null) answers[curIdx] = "skipped"; if(curIdx < currentQs.length-1) { curIdx++; loadQ(); } else finishQuiz(); };
    window.prevQ = () => { if(curIdx > 0) { curIdx--; loadQ(); } };
    window.logout = () => location.reload();
</script>
</body>
</html>
